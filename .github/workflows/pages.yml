name: Deploy Operator Console to GitHub Pages

on:
  push:
    branches:
      - claude/hopeful-clarke-s8kxjk

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npx tsc --outDir dist

      - name: Build site
        run: |
          node --input-type=module -e "
          import { DASHBOARD_HTML } from './dist/core/api/dashboard.js';
          import { writeFileSync, mkdirSync } from 'fs';
          mkdirSync('_site', { recursive: true });
          writeFileSync('_site/index.html', DASHBOARD_HTML);
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - uses: actions/deploy-pages@v4
        id: deployment
