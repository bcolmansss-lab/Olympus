<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Olympus — Operator Console</title>
<style>
:root {
  --bg:#0f0f1a; --panel:#1a1a2e; --panel2:#20203a; --line:#252540; --ink:#e8e8f0;
  --dim:#8888aa; --accent:#6366f1; --accent2:#818cf8; --good:#22d3a5; --warn:#f59e0b; --bad:#ef4444;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",Roboto,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.6 var(--sans);overflow:hidden}
header{display:flex;align-items:center;gap:14px;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--panel);position:relative;z-index:50}
header h1{font-size:16px;margin:0;font-weight:700}
header h1 span{color:var(--accent2)}
header .sub{color:var(--dim);font-size:12px}
#search{margin-left:auto;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:6px 12px;width:260px;font:13px var(--sans)}
#search:focus{outline:none;border-color:var(--accent)}
#layout{display:flex;height:calc(100vh - 53px)}
nav{width:200px;background:var(--panel);border-right:1px solid var(--line);padding:12px 0;overflow-y:auto;flex-shrink:0}
nav a{display:block;padding:8px 20px;color:var(--dim);text-decoration:none;font-size:13px;border-left:3px solid transparent;cursor:pointer}
nav a:hover{color:var(--ink);background:var(--panel2)}
nav a.active{color:var(--ink);border-left-color:var(--accent);background:var(--panel2)}
nav .navgroup{padding:14px 20px 4px;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);opacity:.7}
main{flex:1;overflow-y:auto;padding:22px 26px;position:relative}
h2{font-size:18px;margin:0 0 4px}
.crumb{color:var(--dim);font-size:12px;margin-bottom:16px}
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.card .k{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.card .v{font-size:22px;font-weight:700;font-family:var(--mono);margin-top:2px}
.card .d{font-size:11px;color:var(--dim);margin-top:2px}
.pos{color:var(--good)} .neg{color:var(--bad)} .wrn{color:var(--warn)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--dim);text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:8px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:top}
tr.row:hover{background:var(--panel2);cursor:pointer}
.num{font-family:var(--mono);text-align:right;white-space:nowrap}
.tag{display:inline-block;padding:1px 8px;border-radius:99px;font-size:11px;border:1px solid var(--line);color:var(--dim);white-space:nowrap}
.tag.src-quickbooks{color:#2ca01c;border-color:#2ca01c44}
.tag.src-stripe{color:#8f7fff;border-color:#8f7fff44}
.tag.src-csv{color:var(--warn);border-color:#f59e0b44}
.tag.src-manual{color:var(--accent2);border-color:#818cf844}
.tag.src-seed{color:var(--dim)}
.tag.st-paid,.tag.st-active,.tag.st-connected{color:var(--good);border-color:#22d3a544}
.tag.st-overdue,.tag.st-error{color:var(--bad);border-color:#ef444444}
.tag.st-sent,.tag.st-pending{color:var(--warn);border-color:#f59e0b44}
.toolbar{display:flex;gap:8px;align-items:center;margin:0 0 14px;flex-wrap:wrap}
button{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 14px;font:13px var(--sans);cursor:pointer}
button:hover{border-color:var(--accent)}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.danger{color:var(--bad)}
select,input[type=text],input[type=number],input[type=date],textarea{background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:6px 10px;font:13px var(--sans)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.editable{border-bottom:1px dashed var(--line);cursor:text;min-width:30px;display:inline-block}
.editable:hover{border-bottom-color:var(--accent2);color:var(--accent2)}
.editable:focus{outline:none;border-bottom:1px solid var(--accent);color:var(--ink)}
.win{position:absolute;background:var(--panel);border:1px solid var(--accent);border-radius:12px;box-shadow:0 12px 48px rgba(0,0,0,.6);min-width:420px;max-width:660px;max-height:76vh;display:flex;flex-direction:column;z-index:100}
.win header{cursor:move;border-radius:12px 12px 0 0;padding:9px 14px;background:var(--panel2);border-bottom:1px solid var(--line);user-select:none}
.win header b{font-size:13px}
.win header .x{margin-left:auto;cursor:pointer;color:var(--dim);font-size:16px;padding:0 4px}
.win header .x:hover{color:var(--bad)}
.win .body{padding:14px 16px;overflow-y:auto}
.kv{display:grid;grid-template-columns:150px 1fr;gap:5px 12px;font-size:13px;margin-bottom:12px}
.kv .k{color:var(--dim)}
.hist{font-size:12px;color:var(--dim);border-left:2px solid var(--line);padding-left:10px;margin:4px 0}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin:14px 0 6px;font-weight:600}
.intcard{display:flex;gap:12px;align-items:center}
.intcard .logo{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.formrow{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.formrow label{font-size:12px;color:var(--dim)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel2);border:1px solid var(--good);border-radius:10px;padding:10px 18px;z-index:999;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.empty{color:var(--dim);padding:30px;text-align:center}
.tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:auto;max-height:calc(100vh - 240px)}
a.link{color:var(--accent2);cursor:pointer;text-decoration:none}
a.link:hover{text-decoration:underline}
</style>
</head>
<body>
<header>
  <h1>OLYMPUS <span>◆</span> Operator Console</h1>
  <div class="sub" id="companyName"></div>
  <input id="search" placeholder="Search everything…  (name, memo, amount)" />
</header>
<div id="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<div id="windows"></div>
<script>
"use strict";
/* ============================ data layer ============================ */
const LS_KEY = "olympus-console-v1";
const uid = () => Math.random().toString(36).slice(2, 10);
const today = () => new Date().toISOString().slice(0, 10);
const now = () => new Date().toISOString();
const fmt$ = (n) => (n < 0 ? "-$" : "$") + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

function seedData() {
  const mk = (extra) => ({ id: uid(), source: "seed", createdAt: now(), history: [], ...extra });
  return {
    company: { name: "Acme Rentals LLC" },
    accounts: [
      mk({ name: "Operating Checking", type: "bank", balance: 84210.55 }),
      mk({ name: "Payroll Account", type: "bank", balance: 22040.00 }),
      mk({ name: "Business Credit Card", type: "credit", balance: -4315.22 }),
    ],
    customers: [
      mk({ name: "Northwind Traders", email: "ap@northwind.com", phone: "555-0102", terms: "Net 30" }),
      mk({ name: "Fabrikam Inc", email: "billing@fabrikam.com", phone: "555-0177", terms: "Net 15" }),
    ],
    vendors: [
      mk({ name: "Metro Office Supply", email: "sales@metro-os.com", category: "Supplies" }),
      mk({ name: "CloudHost Pro", email: "billing@cloudhost.pro", category: "Software" }),
    ],
    employees: [
      mk({ name: "Jordan Ellis", role: "Operations Manager", salary: 78000, startDate: "2024-03-11" }),
      mk({ name: "Sam Rivera", role: "Field Technician", salary: 54000, startDate: "2025-01-06" }),
    ],
    projects: [
      mk({ name: "Warehouse Expansion", budget: 45000, spent: 12800, status: "active" }),
    ],
    invoices: [
      mk({ number: "INV-1041", customer: "Northwind Traders", amount: 6200, issued: "2026-06-10", due: "2026-07-10", status: "sent" }),
      mk({ number: "INV-1042", customer: "Fabrikam Inc", amount: 3450, issued: "2026-06-18", due: "2026-07-03", status: "overdue" }),
      mk({ number: "INV-1039", customer: "Northwind Traders", amount: 8800, issued: "2026-05-02", due: "2026-06-01", status: "paid" }),
    ],
    transactions: [
      mk({ date: "2026-07-01", amount: 8800, direction: "in", account: "Operating Checking", category: "Sales", counterparty: "Northwind Traders", memo: "Payment for INV-1039", ref: "INV-1039" }),
      mk({ date: "2026-07-02", amount: -1249.99, direction: "out", account: "Business Credit Card", category: "Software", counterparty: "CloudHost Pro", memo: "Annual hosting renewal" }),
      mk({ date: "2026-07-03", amount: -6500, direction: "out", account: "Payroll Account", category: "Payroll", counterparty: "Payroll run 2026-07-A", memo: "Semi-monthly payroll" }),
      mk({ date: "2026-07-05", amount: -312.4, direction: "out", account: "Operating Checking", category: "Supplies", counterparty: "Metro Office Supply", memo: "Packing materials" }),
    ],
    integrations: [
      { key: "quickbooks", name: "QuickBooks Online", color: "#2ca01c", desc: "Chart of accounts, invoices, bills, payments", status: "disconnected", config: {} },
      { key: "xero", name: "Xero", color: "#13b5ea", desc: "Accounting sync — ledgers and contacts", status: "disconnected", config: {} },
      { key: "stripe", name: "Stripe", color: "#635bff", desc: "Payments, payouts, subscriptions", status: "disconnected", config: {} },
      { key: "plaid", name: "Plaid", color: "#111", desc: "Live bank feeds and balance checks", status: "disconnected", config: {} },
      { key: "gusto", name: "Gusto", color: "#f45d48", desc: "Payroll runs and benefits", status: "disconnected", config: {} },
      { key: "salesforce", name: "Salesforce", color: "#00a1e0", desc: "CRM pipeline and accounts", status: "disconnected", config: {} },
      { key: "hubspot", name: "HubSpot", color: "#ff7a59", desc: "Marketing and deal flow", status: "disconnected", config: {} },
      { key: "shopify", name: "Shopify", color: "#95bf47", desc: "Orders, products, storefront revenue", status: "disconnected", config: {} },
      { key: "asana", name: "Asana", color: "#f06a6a", desc: "Project and task planning", status: "disconnected", config: {} },
      { key: "netsuite", name: "NetSuite", color: "#125580", desc: "ERP master records", status: "disconnected", config: {} },
    ],
    audit: [],
  };
}
let db = (() => { try { const raw = localStorage.getItem(LS_KEY); if (raw) return JSON.parse(raw); } catch (e) {} return seedData(); })();
function save() { localStorage.setItem(LS_KEY, JSON.stringify(db)); }
function audit(action, detail) {
  db.audit.unshift({ at: now(), action, detail });
  if (db.audit.length > 500) db.audit.pop();
  save();
}
function toast(msg) {
  const t = document.createElement("div"); t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2600);
}

/* ============================ edit-in-place ============================ */
/* Any field on any record is editable: renders a contenteditable span that
   writes back to the record, stamps provenance history, and logs to audit. */
function editable(coll, rec, field, opts = {}) {
  const isNum = opts.num;
  const val = rec[field] ?? "";
  const shown = isNum && val !== "" ? fmt$(Number(val)) : String(val);
  return `<span class="editable" contenteditable="true" data-coll="${coll}" data-id="${rec.id}" data-field="${field}" data-num="${isNum ? 1 : 0}">${shown}</span>`;
}
document.addEventListener("blur", (ev) => {
  const el = ev.target;
  if (!el.classList || !el.classList.contains("editable")) return;
  const { coll, id, field } = el.dataset;
  const rec = db[coll].find((r) => r.id === id);
  if (!rec) return;
  let nv = el.textContent.trim();
  if (el.dataset.num === "1") nv = Number(nv.replace(/[$,]/g, "")) || 0;
  const old = rec[field];
  if (String(old) === String(nv)) { el.textContent = el.dataset.num === "1" ? fmt$(Number(old)) : String(old ?? ""); return; }
  rec.history = rec.history || [];
  rec.history.push({ at: now(), field, from: old, to: nv, by: "operator" });
  rec[field] = nv;
  if (rec.source === "seed") rec.source = "manual";
  audit("edit", `${coll}/${rec.name || rec.number || rec.memo || rec.id}: ${field} ${JSON.stringify(old)} → ${JSON.stringify(nv)}`);
  toast("Saved — change logged to audit trail");
  render();
}, true);
document.addEventListener("keydown", (ev) => {
  if (ev.target.classList && ev.target.classList.contains("editable") && ev.key === "Enter") { ev.preventDefault(); ev.target.blur(); }
  if (ev.key === "/" && !/INPUT|TEXTAREA|SELECT/.test(ev.target.tagName) && !ev.target.isContentEditable) {
    ev.preventDefault(); document.getElementById("search").focus();
  }
});

/* ============================ floating windows ============================ */
let zTop = 100;
function openWindow(title, bodyHtml) {
  const host = document.getElementById("windows");
  const w = document.createElement("div");
  w.className = "win";
  const n = host.children.length;
  w.style.left = (120 + n * 34) + "px";
  w.style.top = (90 + n * 30) + "px";
  w.style.zIndex = ++zTop;
  w.innerHTML = `<header><b>${title}</b><span class="x" title="Close">✕</span></header><div class="body">${bodyHtml}</div>`;
  w.querySelector(".x").onclick = () => w.remove();
  w.onmousedown = () => { w.style.zIndex = ++zTop; };
  const h = w.querySelector("header");
  h.onmousedown = (e) => {
    if (e.target.classList.contains("x")) return;
    const sx = e.clientX - w.offsetLeft, sy = e.clientY - w.offsetTop;
    const mv = (e2) => { w.style.left = (e2.clientX - sx) + "px"; w.style.top = Math.max(56, e2.clientY - sy) + "px"; };
    const up = () => { document.removeEventListener("mousemove", mv); document.removeEventListener("mouseup", up); };
    document.addEventListener("mousemove", mv); document.addEventListener("mouseup", up);
  };
  host.appendChild(w);
  return w;
}
function provenanceHtml(rec) {
  const hist = (rec.history || []).slice().reverse().map((h) =>
    `<div class="hist">${new Date(h.at).toLocaleString()} — <b>${h.field}</b> changed from <i>${h.from ?? "—"}</i> to <i>${h.to}</i> (${h.by})</div>`).join("") || `<div class="hist">No edits since creation.</div>`;
  return `<div class="section-title">Provenance</div>
    <div class="kv"><div class="k">Source</div><div><span class="tag src-${(rec.source||"manual").split(":")[0]}">${rec.source}</span></div>
    <div class="k">Created</div><div>${new Date(rec.createdAt).toLocaleString()}</div>
    <div class="k">Record ID</div><div style="font-family:var(--mono)">${rec.id}</div></div>
    <div class="section-title">Change history</div>${hist}`;
}
function drill(coll, id) {
  const rec = db[coll].find((r) => r.id === id);
  if (!rec) return;
  const skip = new Set(["id", "source", "createdAt", "history"]);
  const rows = Object.keys(rec).filter((k) => !skip.has(k)).map((k) => {
    const isNum = typeof rec[k] === "number" && /amount|balance|salary|budget|spent/.test(k);
    return `<div class="k">${k}</div><div>${editable(coll, rec, k, { num: isNum })}</div>`;
  }).join("");
  let related = "";
  const nm = rec.name || rec.number;
  if (nm) {
    const rel = db.transactions.filter((t) => t.id !== rec.id && (t.counterparty === nm || t.ref === nm || t.account === nm));
    if (rel.length) {
      related = `<div class="section-title">Linked money movement</div>` + rel.map((t) =>
        `<div class="hist"><a class="link" onclick="drill('transactions','${t.id}')">${t.date} · ${fmt$(t.amount)} · ${t.memo}</a></div>`).join("");
    }
  }
  const actions = coll === "invoices" && rec.status !== "paid"
    ? `<button class="primary" onclick="recordPayment('${rec.id}',this)">✓ Record payment (${fmt$(rec.amount)})</button> `
    : "";
  openWindow(`${coll.slice(0, -1)} — ${rec.name || rec.number || rec.memo || rec.id}`,
    `<div class="kv">${rows}</div>${related}${provenanceHtml(rec)}
     <div style="margin-top:14px">${actions}<button class="danger" onclick="delRec('${coll}','${rec.id}',this)">Delete record</button></div>`);
}
/* Mark an invoice paid and write the matching ledger transaction, linked by ref. */
function recordPayment(invoiceId, btn) {
  const inv = db.invoices.find((i) => i.id === invoiceId);
  if (!inv || inv.status === "paid") return;
  inv.history = inv.history || [];
  inv.history.push({ at: now(), field: "status", from: inv.status, to: "paid", by: "operator" });
  inv.status = "paid";
  const bank = db.accounts.find((a) => a.type === "bank") || db.accounts[0];
  db.transactions.unshift({ id: uid(), source: "manual", createdAt: now(), history: [],
    date: today(), amount: inv.amount, direction: "in",
    account: bank ? bank.name : "Undeposited", category: "Sales",
    counterparty: inv.customer, memo: "Payment for " + inv.number, ref: inv.number });
  if (bank) bank.balance = Math.round((bank.balance + inv.amount) * 100) / 100;
  audit("payment", `${inv.number}: ${fmt$(inv.amount)} received from ${inv.customer} → ${bank ? bank.name : "Undeposited"}`);
  btn.closest(".win").remove();
  toast(`Payment recorded — ${fmt$(inv.amount)} posted to the ledger`);
  render();
}
function delRec(coll, id, btn) {
  const rec = db[coll].find((r) => r.id === id);
  if (!rec) return;
  if (!btn.dataset.armed) { btn.dataset.armed = "1"; btn.textContent = "Click again to confirm delete"; return; }
  db[coll] = db[coll].filter((r) => r.id !== id);
  audit("delete", `${coll}: removed ${rec.name || rec.number || rec.memo || id}`);
  btn.closest(".win").remove();
  toast("Deleted — logged to audit trail");
  render();
}

/* ============================ add records ============================ */
const SCHEMAS = {
  transactions: [["date","date",""],["amount","number",""],["account","select:accounts"],["category","text","General"],["counterparty","text",""],["memo","text",""],["ref","text",""]],
  invoices: [["number","text","INV-"],["customer","select:customers"],["amount","number",""],["issued","date",""],["due","date",""],["status","choice:draft,sent,paid,overdue"]],
  customers: [["name","text",""],["email","text",""],["phone","text",""],["terms","text","Net 30"]],
  vendors: [["name","text",""],["email","text",""],["category","text",""]],
  employees: [["name","text",""],["role","text",""],["salary","number",""],["startDate","date",""]],
  accounts: [["name","text",""],["type","choice:bank,credit,cash,loan"],["balance","number","0"]],
  projects: [["name","text",""],["budget","number",""],["spent","number","0"],["status","choice:active,paused,done"]],
};
function addForm(coll) {
  const rows = SCHEMAS[coll].map(([f, kind, dflt]) => {
    let input;
    if (kind.startsWith("select:")) {
      const src = kind.split(":")[1];
      input = `<select data-f="${f}">${db[src].map((r) => `<option>${r.name}</option>`).join("")}</select>`;
    } else if (kind.startsWith("choice:")) {
      input = `<select data-f="${f}">${kind.split(":")[1].split(",").map((o) => `<option>${o}</option>`).join("")}</select>`;
    } else {
      const dv = kind === "date" && !dflt ? today() : (dflt ?? "");
      input = `<input type="${kind}" data-f="${f}" value="${dv}" ${kind === "number" ? 'step="0.01"' : ""}/>`;
    }
    return `<div class="formrow"><label>${f}</label>${input}</div>`;
  }).join("");
  const w = openWindow(`New ${coll.slice(0, -1)}`, `${rows}<button class="primary" style="margin-top:6px">Create</button>`);
  w.querySelector("button.primary").onclick = () => {
    const rec = { id: uid(), source: "manual", createdAt: now(), history: [] };
    w.querySelectorAll("[data-f]").forEach((el) => {
      rec[el.dataset.f] = el.type === "number" ? Number(el.value) || 0 : el.value;
    });
    if (coll === "transactions") rec.direction = rec.amount >= 0 ? "in" : "out";
    db[coll].unshift(rec);
    audit("create", `${coll}: added ${rec.name || rec.number || rec.memo || rec.id}`);
    w.remove(); toast("Created"); render();
  };
}

/* ============================ CSV import (real) ============================ */
function importCsv() {
  const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".csv";
  inp.onchange = () => {
    const file = inp.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const lines = String(reader.result).split(/\r?\n/).filter((l) => l.trim());
      const head = lines[0].split(",").map((h) => h.trim().toLowerCase());
      const col = (names) => head.findIndex((h) => names.includes(h));
      const ci = { date: col(["date","transaction date"]), amount: col(["amount","value"]), memo: col(["memo","description","desc"]), cp: col(["counterparty","payee","name","merchant"]), cat: col(["category"]) };
      if (ci.date < 0 || ci.amount < 0) { toast("CSV needs at least 'date' and 'amount' columns"); return; }
      let added = 0;
      for (const line of lines.slice(1)) {
        const c = line.split(",");
        const amount = Number(String(c[ci.amount]).replace(/[$," ]/g, ""));
        if (isNaN(amount)) continue;
        db.transactions.unshift({ id: uid(), source: "csv:" + file.name, createdAt: now(), history: [],
          date: c[ci.date].trim(), amount, direction: amount >= 0 ? "in" : "out",
          account: db.accounts[0] ? db.accounts[0].name : "Imported",
          category: ci.cat >= 0 ? (c[ci.cat] || "Imported").trim() : "Imported",
          counterparty: ci.cp >= 0 ? (c[ci.cp] || "").trim() : "", memo: ci.memo >= 0 ? (c[ci.memo] || "").trim() : "" });
        added++;
      }
      audit("import", `CSV ${file.name}: ${added} transactions`);
      toast(`Imported ${added} transactions from ${file.name}`); render();
    };
    reader.readAsText(file);
  };
  inp.click();
}

/* ============================ integrations ============================ */
function connectIntegration(key) {
  const integ = db.integrations.find((i) => i.key === key);
  const w = openWindow(`Connect ${integ.name}`, `
    <p style="color:var(--dim);font-size:13px;margin-top:0">${integ.desc}. Credentials are stored only in this browser (localStorage). Live two-way sync activates when this console is served by the Olympus API server; until then the connection is registered and used to label imported data.</p>
    <div class="formrow"><label>Account / Company ID</label><input type="text" data-f="companyId" placeholder="e.g. 9341823647"/></div>
    <div class="formrow"><label>API key / token</label><input type="text" data-f="apiKey" placeholder="sk_… or OAuth token"/></div>
    <div class="formrow"><label>Environment</label><select data-f="env"><option>production</option><option>sandbox</option></select></div>
    <button class="primary">Connect</button>`);
  w.querySelector("button.primary").onclick = () => {
    integ.config = {};
    w.querySelectorAll("[data-f]").forEach((el) => integ.config[el.dataset.f] = el.value);
    if (!integ.config.apiKey) { toast("An API key/token is required"); return; }
    integ.status = "connected"; integ.connectedAt = now();
    audit("integration", `${integ.name} connected (${integ.config.env})`);
    w.remove(); toast(`${integ.name} connected`); render();
  };
}
function disconnectIntegration(key) {
  const integ = db.integrations.find((i) => i.key === key);
  integ.status = "disconnected"; integ.config = {};
  audit("integration", `${integ.name} disconnected`); render();
}

/* ============================ views ============================ */
const VIEWS = {
  overview: { label: "Overview", group: "Company" },
  ledger: { label: "Ledger", group: "Money" },
  reports: { label: "Reports", group: "Money" },
  invoices: { label: "Invoices", group: "Money" },
  accounts: { label: "Accounts", group: "Money" },
  customers: { label: "Customers", group: "Relationships" },
  vendors: { label: "Vendors", group: "Relationships" },
  employees: { label: "Employees", group: "Operations" },
  projects: { label: "Projects", group: "Operations" },
  integrations: { label: "Integrations", group: "System" },
  auditlog: { label: "Audit trail", group: "System" },
  data: { label: "Data / backup", group: "System" },
};
let view = location.hash.slice(1) || "overview";
let query = "";
document.getElementById("search").addEventListener("input", (e) => { query = e.target.value.toLowerCase(); render(); });
window.addEventListener("hashchange", () => { view = location.hash.slice(1) || "overview"; render(); });

function match(rec) {
  if (!query) return true;
  return JSON.stringify(rec).toLowerCase().includes(query);
}
function tbl(coll, cols, renderRow) {
  const rows = db[coll].filter(match);
  if (!rows.length) return `<div class="tablewrap"><div class="empty">Nothing here${query ? " matching “" + query + "”" : ""} — click “+ Add” above.</div></div>`;
  return `<div class="tablewrap"><table><thead><tr>${cols.map((c) => `<th>${c}</th>`).join("")}</tr></thead><tbody>` +
    rows.map((r) => `<tr class="row" onclick="if(!event.target.classList.contains('editable')&&event.target.tagName!=='A')drill('${coll}','${r.id}')">${renderRow(r)}</tr>`).join("") +
    `</tbody></table></div>`;
}
const srcTag = (r) => `<span class="tag src-${(r.source||"manual").split(":")[0]}" title="${r.source}">${(r.source||"").split(":")[0]}</span>`;

/* Inline SVG bar chart of monthly net cash flow — no dependencies. */
function cashflowChart() {
  const byMonth = {};
  for (const t of db.transactions) {
    const m = (t.date || "").slice(0, 7);
    if (!m) continue;
    byMonth[m] = byMonth[m] || { in: 0, out: 0 };
    if (t.amount >= 0) byMonth[m].in += t.amount; else byMonth[m].out += -t.amount;
  }
  const months = Object.keys(byMonth).sort().slice(-8);
  if (!months.length) return "";
  const max = Math.max(...months.flatMap((m) => [byMonth[m].in, byMonth[m].out]), 1);
  const bw = 26, gap = 46, H = 130;
  const bars = months.map((m, i) => {
    const x = 20 + i * (bw * 2 + gap);
    const hi = Math.round((byMonth[m].in / max) * H), ho = Math.round((byMonth[m].out / max) * H);
    return `<rect x="${x}" y="${150 - hi}" width="${bw}" height="${hi}" rx="3" fill="var(--good)" opacity=".85"><title>${m} in: ${fmt$(byMonth[m].in)}</title></rect>
      <rect x="${x + bw + 3}" y="${150 - ho}" width="${bw}" height="${ho}" rx="3" fill="var(--bad)" opacity=".8"><title>${m} out: ${fmt$(byMonth[m].out)}</title></rect>
      <text x="${x + bw}" y="164" fill="var(--dim)" font-size="10" text-anchor="middle">${m.slice(2)}</text>`;
  }).join("");
  const width = 40 + months.length * (bw * 2 + gap);
  return `<div class="card" style="margin-top:16px"><div class="k">Cash flow by month — <span style="color:var(--good)">in</span> vs <span style="color:var(--bad)">out</span> (hover bars for amounts)</div>
    <svg viewBox="0 0 ${width} 170" style="width:100%;max-width:${width * 1.4}px;margin-top:8px">${bars}</svg></div>`;
}
function renderView() {
  if (view === "overview") {
    const cashIn = db.transactions.filter((t) => t.amount > 0).reduce((s, t) => s + t.amount, 0);
    const cashOut = db.transactions.filter((t) => t.amount < 0).reduce((s, t) => s + t.amount, 0);
    const ar = db.invoices.filter((i) => i.status === "sent" || i.status === "overdue").reduce((s, i) => s + i.amount, 0);
    const bal = db.accounts.reduce((s, a) => s + a.balance, 0);
    const overdue = db.invoices.filter((i) => i.status === "overdue");
    return `<h2>${editable("companyMeta", dbCompanyRec(), "name")}</h2><div class="crumb">Live picture assembled from ${db.transactions.length} transactions · ${db.invoices.length} invoices · ${db.integrations.filter(i=>i.status==="connected").length} connected integrations</div>
    <div class="grid g4">
      <div class="card"><div class="k">Cash position</div><div class="v">${fmt$(bal)}</div><div class="d">across ${db.accounts.length} accounts — <a class="link" href="#accounts">open</a></div></div>
      <div class="card"><div class="k">Money in</div><div class="v pos">${fmt$(cashIn)}</div><div class="d">recorded inflows</div></div>
      <div class="card"><div class="k">Money out</div><div class="v neg">${fmt$(cashOut)}</div><div class="d">recorded outflows</div></div>
      <div class="card"><div class="k">Outstanding A/R</div><div class="v ${overdue.length ? "wrn" : ""}">${fmt$(ar)}</div><div class="d">${overdue.length} overdue — <a class="link" href="#invoices">open invoices</a></div></div>
    </div>
    ${cashflowChart()}
    <div class="section-title" style="margin-top:22px">Latest money movement (click any row to drill into where it came from)</div>
    ${tbl("transactions", ["Date","Amount","Counterparty","Category","Memo","Source"], (t) =>
      `<td>${t.date}</td><td class="num ${t.amount>=0?"pos":"neg"}">${fmt$(t.amount)}</td><td>${t.counterparty||"—"}</td><td>${t.category}</td><td>${t.memo||""}</td><td>${srcTag(t)}</td>`)}`;
  }
  if (view === "ledger") {
    const total = db.transactions.filter(match).reduce((s, t) => s + t.amount, 0);
    return `<h2>Ledger</h2><div class="crumb">Every dollar with its origin. Click a row to drill in and edit. Net of ${db.transactions.filter(match).length} shown: <b class="${total>=0?"pos":"neg"}">${fmt$(total)}</b></div>
    <div class="toolbar"><button class="primary" onclick="addForm('transactions')">+ Add transaction</button><button onclick="importCsv()">⬆ Import CSV (bank/QuickBooks export)</button></div>
    ${tbl("transactions", ["Date","Amount","Direction","Account","Counterparty","Category","Memo","Ref","Source"], (t) =>
      `<td>${t.date}</td><td class="num ${t.amount>=0?"pos":"neg"}">${fmt$(t.amount)}</td><td>${t.direction}</td><td>${t.account}</td><td>${t.counterparty||"—"}</td><td>${t.category}</td><td>${t.memo||""}</td><td>${t.ref||"—"}</td><td>${srcTag(t)}</td>`)}`;
  }
  if (view === "reports") {
    const cats = {};
    for (const t of db.transactions) {
      const c = t.category || "Uncategorized";
      cats[c] = cats[c] || { in: 0, out: 0 };
      if (t.amount >= 0) cats[c].in += t.amount; else cats[c].out += -t.amount;
    }
    const catRows = Object.entries(cats).sort((a, b) => (b[1].in + b[1].out) - (a[1].in + a[1].out)).map(([c, v]) =>
      `<tr><td>${c}</td><td class="num pos">${v.in ? fmt$(v.in) : "—"}</td><td class="num neg">${v.out ? fmt$(v.out) : "—"}</td><td class="num ${v.in - v.out >= 0 ? "pos" : "neg"}">${fmt$(v.in - v.out)}</td></tr>`).join("");
    const totIn = Object.values(cats).reduce((s, v) => s + v.in, 0);
    const totOut = Object.values(cats).reduce((s, v) => s + v.out, 0);
    const t = today();
    const aging = { current: 0, d30: 0, d60: 0, d90: 0 };
    for (const i of db.invoices) {
      if (i.status === "paid" || i.status === "draft") continue;
      const days = Math.floor((new Date(t) - new Date(i.due)) / 86400000);
      if (days <= 0) aging.current += i.amount; else if (days <= 30) aging.d30 += i.amount;
      else if (days <= 60) aging.d60 += i.amount; else aging.d90 += i.amount;
    }
    return `<h2>Reports</h2><div class="crumb">Profit & loss by category, plus receivables aging — built live from the ledger and invoices.</div>
    <div class="section-title">P&L by category</div>
    <div class="tablewrap" style="max-height:none"><table><thead><tr><th>Category</th><th style="text-align:right">Money in</th><th style="text-align:right">Money out</th><th style="text-align:right">Net</th></tr></thead><tbody>${catRows}
      <tr style="font-weight:700"><td>Total</td><td class="num pos">${fmt$(totIn)}</td><td class="num neg">${fmt$(totOut)}</td><td class="num ${totIn - totOut >= 0 ? "pos" : "neg"}">${fmt$(totIn - totOut)}</td></tr>
    </tbody></table></div>
    <div class="section-title" style="margin-top:20px">Accounts receivable aging (unpaid invoices by days past due)</div>
    <div class="grid g4">
      <div class="card"><div class="k">Current</div><div class="v">${fmt$(aging.current)}</div></div>
      <div class="card"><div class="k">1–30 days</div><div class="v wrn">${fmt$(aging.d30)}</div></div>
      <div class="card"><div class="k">31–60 days</div><div class="v wrn">${fmt$(aging.d60)}</div></div>
      <div class="card"><div class="k">60+ days</div><div class="v neg">${fmt$(aging.d90)}</div></div>
    </div>
    ${cashflowChart()}`;
  }
  if (view === "invoices") {
    return `<h2>Invoices</h2><div class="crumb">Click a row to open it in a window — edit amounts, mark paid, see linked payments.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('invoices')">+ Add invoice</button></div>
    ${tbl("invoices", ["Number","Customer","Amount","Issued","Due","Status","Source"], (i) =>
      `<td>${i.number}</td><td><a class="link" onclick="event.stopPropagation();drillByName('customers','${i.customer}')">${i.customer}</a></td><td class="num">${fmt$(i.amount)}</td><td>${i.issued}</td><td>${i.due}</td><td><span class="tag st-${i.status}">${i.status}</span></td><td>${srcTag(i)}</td>`)}`;
  }
  if (view === "accounts") {
    return `<h2>Accounts</h2><div class="crumb">Balances are editable inline — click a number.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('accounts')">+ Add account</button></div>
    ${tbl("accounts", ["Name","Type","Balance","Source"], (a) =>
      `<td>${editable("accounts",a,"name")}</td><td>${a.type}</td><td class="num">${editable("accounts",a,"balance",{num:true})}</td><td>${srcTag(a)}</td>`)}`;
  }
  if (view === "customers") {
    return `<h2>Customers</h2><div class="toolbar" style="margin-top:10px"><button class="primary" onclick="addForm('customers')">+ Add customer</button></div>
    ${tbl("customers", ["Name","Email","Phone","Terms","Source"], (c) =>
      `<td>${editable("customers",c,"name")}</td><td>${editable("customers",c,"email")}</td><td>${editable("customers",c,"phone")}</td><td>${editable("customers",c,"terms")}</td><td>${srcTag(c)}</td>`)}`;
  }
  if (view === "vendors") {
    return `<h2>Vendors</h2><div class="toolbar" style="margin-top:10px"><button class="primary" onclick="addForm('vendors')">+ Add vendor</button></div>
    ${tbl("vendors", ["Name","Email","Category","Source"], (v) =>
      `<td>${editable("vendors",v,"name")}</td><td>${editable("vendors",v,"email")}</td><td>${editable("vendors",v,"category")}</td><td>${srcTag(v)}</td>`)}`;
  }
  if (view === "employees") {
    return `<h2>Employees</h2><div class="toolbar" style="margin-top:10px"><button class="primary" onclick="addForm('employees')">+ Add employee</button></div>
    ${tbl("employees", ["Name","Role","Salary","Start date","Source"], (e) =>
      `<td>${editable("employees",e,"name")}</td><td>${editable("employees",e,"role")}</td><td class="num">${editable("employees",e,"salary",{num:true})}</td><td>${e.startDate}</td><td>${srcTag(e)}</td>`)}`;
  }
  if (view === "projects") {
    return `<h2>Projects</h2><div class="toolbar" style="margin-top:10px"><button class="primary" onclick="addForm('projects')">+ Add project</button></div>
    ${tbl("projects", ["Name","Budget","Spent","Remaining","Status","Source"], (p) =>
      `<td>${editable("projects",p,"name")}</td><td class="num">${editable("projects",p,"budget",{num:true})}</td><td class="num">${editable("projects",p,"spent",{num:true})}</td><td class="num ${p.budget-p.spent<0?"neg":"pos"}">${fmt$(p.budget-p.spent)}</td><td><span class="tag st-${p.status}">${p.status}</span></td><td>${srcTag(p)}</td>`)}`;
  }
  if (view === "integrations") {
    return `<h2>Integrations</h2><div class="crumb">Connect the tools this company already runs on. Keys stay in your browser; imports are labeled with their source so every number is traceable.</div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">` +
      db.integrations.map((i) => `<div class="card intcard">
        <div class="logo" style="background:${i.color}">${i.name[0]}</div>
        <div style="flex:1"><b>${i.name}</b><div style="font-size:12px;color:var(--dim)">${i.desc}</div>
        <div style="margin-top:6px"><span class="tag st-${i.status}">${i.status}</span>${i.connectedAt ? ` <span class="tag">${i.config.env||""}</span>` : ""}</div></div>
        ${i.status === "connected"
          ? `<button onclick="disconnectIntegration('${i.key}')">Disconnect</button>`
          : `<button class="primary" onclick="connectIntegration('${i.key}')">Connect</button>`}
      </div>`).join("") + `</div>`;
  }
  if (view === "auditlog") {
    return `<h2>Audit trail</h2><div class="crumb">Every create, edit, delete, import, and integration change — newest first.</div>
    <div class="tablewrap"><table><thead><tr><th>When</th><th>Action</th><th>Detail</th></tr></thead><tbody>` +
      (db.audit.filter((a) => !query || JSON.stringify(a).toLowerCase().includes(query)).map((a) =>
        `<tr><td style="white-space:nowrap">${new Date(a.at).toLocaleString()}</td><td><span class="tag">${a.action}</span></td><td>${a.detail}</td></tr>`).join("") || `<tr><td colspan="3" class="empty">No activity yet.</td></tr>`) +
    `</tbody></table></div>`;
  }
  if (view === "data") {
    return `<h2>Data & backup</h2><div class="crumb">Your data lives in this browser (localStorage). Export it to a file to move machines or feed the Olympus API server.</div>
    <div class="toolbar">
      <button class="primary" onclick="exportJson()">⬇ Export everything (JSON)</button>
      <button onclick="importJson()">⬆ Restore from JSON</button>
      <button class="danger" onclick="resetAll(this)">Reset to demo data</button>
    </div>
    <div class="card"><div class="k">Current dataset</div><div class="d" style="font-size:13px;margin-top:6px">
      ${db.transactions.length} transactions · ${db.invoices.length} invoices · ${db.customers.length} customers · ${db.vendors.length} vendors · ${db.employees.length} employees · ${db.projects.length} projects · ${db.audit.length} audit entries
    </div></div>`;
  }
  return `<div class="empty">Unknown view</div>`;
}
function dbCompanyRec() {
  if (!db.companyMeta) db.companyMeta = [{ id: "company", name: db.company.name, source: "seed", createdAt: now(), history: [] }];
  return db.companyMeta[0];
}
function drillByName(coll, name) {
  const rec = db[coll].find((r) => r.name === name);
  if (rec) drill(coll, rec.id);
}
function exportJson() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "olympus-data-" + today() + ".json";
  a.click();
  audit("export", "Full dataset exported to JSON");
}
function importJson() {
  const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json";
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => { try { db = JSON.parse(String(r.result)); save(); toast("Dataset restored"); render(); } catch (e) { toast("Not a valid Olympus JSON export"); } };
    r.readAsText(f);
  };
  inp.click();
}
function resetAll(btn) {
  if (!btn.dataset.armed) { btn.dataset.armed = "1"; btn.textContent = "Click again to wipe & reset"; return; }
  db = seedData(); save(); toast("Reset to demo data"); render();
}

/* ============================ shell ============================ */
function render() {
  save();
  document.getElementById("companyName").textContent = (db.companyMeta ? db.companyMeta[0].name : db.company.name);
  const groups = {};
  for (const [key, v] of Object.entries(VIEWS)) (groups[v.group] = groups[v.group] || []).push([key, v.label]);
  document.getElementById("nav").innerHTML = Object.entries(groups).map(([g, items]) =>
    `<div class="navgroup">${g}</div>` + items.map(([k, label]) =>
      `<a href="#${k}" class="${view === k ? "active" : ""}">${label}</a>`).join("")).join("");
  document.getElementById("main").innerHTML = renderView();
}
render();
</script>
