    <div class="toolbar"><button class="primary" onclick="addForm('invoices')">+ Invoice</button></div>
    ${tbl("invoices", [["Number","number"],["Customer","customer"],["Amount","amount"],["Issued","issued"],["Due","due"],["Status","status"],["Source"]], (i) =>
      `<td>${i.number}</td><td><a class="link" onclick="event.stopPropagation();drillByName('customers','${i.customer}')">${i.customer}</a></td><td class="num">${fmt$(i.amount)}</td><td>${i.issued}</td><td>${i.due}</td><td>${stTag(i.status)}</td><td>${srcTag(i)}</td>`)}`;
  }
  if (view === "bills") {
    return `<h2>Bills — accounts payable</h2><div class="crumb">Payments above ${fmt$(approvalThreshold())} route to the approval queue automatically.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('bills')">+ Bill</button></div>
    ${tbl("bills", [["Number","number"],["Vendor","vendor"],["Amount","amount"],["Received","received"],["Due","due"],["Category","category"],["Status","status"],["",""]], (b) =>
      `<td>${b.number}</td><td><a class="link" onclick="event.stopPropagation();drillByName('vendors','${b.vendor}')">${b.vendor}</a></td><td class="num">${fmt$(b.amount)}</td><td>${b.received}</td><td>${b.due}</td><td>${b.category||"—"}</td><td>${stTag(b.status)}</td>
       <td>${b.status !== "paid" ? `<button onclick="event.stopPropagation();payBill('${b.id}')">Pay</button>` : ""}</td>`)}`;
  }
  if (view === "accounts") {
    return `<h2>Accounts</h2><div class="crumb">Balances are editable inline.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('accounts')">+ Account</button></div>
    ${tbl("accounts", [["Name","name"],["Type","type"],["Balance","balance"],["Source"]], (a) =>
      `<td>${editable("accounts",a,"name")}</td><td>${a.type}</td><td class="num">${editable("accounts",a,"balance",{num:true})}</td><td>${srcTag(a)}</td>`)}`;
  }
  if (view === "budgets") {
    const m = thisMonth();
    const spent = {};
    for (const t of db.transactions) if (t.amount < 0 && (t.date || "").slice(0, 7) === m) spent[t.category] = (spent[t.category] || 0) - t.amount;
    return `<h2>Budgets — ${m}</h2><div class="crumb">Monthly budget vs actual spend by category, from the live ledger.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('budgets')">+ Budget line</button></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">` +
      db.budgets.map((b) => {
        const used = spent[b.category] || 0;
        const pct = Math.min(100, Math.round((used / (b.monthlyUsd || 1)) * 100));
        const over = used > b.monthlyUsd;
        return `<div class="card" style="cursor:pointer" onclick="drill('budgets','${b.id}')"><div class="k">${b.category}</div>
          <div class="v" style="font-size:16px">${fmt$(used)} <span style="color:var(--faint);font-weight:400;font-size:12px">of ${fmt$(b.monthlyUsd)}</span></div>
          <div class="bar"><i class="${over ? "over" : ""}" style="width:${pct}%"></i></div>
          <div class="d" style="margin-top:5px" class="${over ? "neg" : ""}">${over ? `<span class="neg">Over by ${fmt$(used - b.monthlyUsd)}</span>` : pct + "% used"}</div></div>`;
      }).join("") + `</div>`;
  }
  if (view === "forecast") {
    const months = {};
    for (const t of db.transactions) {
      const m = (t.date || "").slice(0, 7); if (!m) continue;
      months[m] = months[m] || { in: 0, out: 0 };
      if (t.amount >= 0) months[m].in += t.amount; else months[m].out += -t.amount;
    }
    const hist = Object.keys(months).sort().slice(-4, -1);
    const baseIn = hist.length ? hist.reduce((s, k) => s + months[k].in, 0) / hist.length : 0;
    const baseOut = hist.length ? hist.reduce((s, k) => s + months[k].out, 0) / hist.length : 0;
    const recurringOut = db.rules.filter((r) => r.enabled && r.kind === "recurring" && r.amount < 0).reduce((s, r) => s - r.amount, 0);
    let cash = db.accounts.reduce((s, a) => s + a.balance, 0);
    const start = new Date(today().slice(0, 7) + "-01T00:00:00Z");
    const rows = [];
    let firstNegative = null;
    for (let i = 1; i <= 6; i++) {
      const d = new Date(start); d.setUTCMonth(d.getUTCMonth() + i);
      const m = d.toISOString().slice(0, 7);
      const arDue = db.invoices.filter((x) => (x.status === "sent" || x.status === "overdue") && (x.due || "").slice(0, 7) === m).reduce((s, x) => s + x.amount, 0);
      const apDue = db.bills.filter((x) => x.status === "open" && (x.due || "").slice(0, 7) === m).reduce((s, x) => s + x.amount, 0);
      const grow = (base, pct) => base * Math.pow(1 + pct / 100, i);
      const inflow = grow(baseIn, scenario.rev) + arDue;
      const outflow = grow(baseOut, scenario.cost) + apDue + recurringOut;
      const net = inflow - outflow;
      cash += net;
      if (cash < 0 && firstNegative === null) firstNegative = m;
      rows.push({ m, inflow, outflow, arDue, apDue, net, cash });
    }
    const maxCash = Math.max(...rows.map((r) => Math.abs(r.cash)), 1);
    const W = 620, H = 130, step = W / (rows.length - 1 || 1);
    const y = (c) => 20 + (H - Math.max(4, (Math.max(0, c) / maxCash) * H));
    const pts = rows.map((r, i) => `${20 + i * step},${y(r.cash)}`).join(" ");
    return `<h2>Cash forecast — next 6 months</h2>
    <div class="crumb">Baseline = trailing 3-month average flows, plus scheduled receivables, open bills by due date, and active recurring rules. A planning projection, not a promise.</div>
    <div class="toolbar"><span style="color:var(--dim);font-size:12px">Scenario:</span>
      <label style="font-size:12px;color:var(--dim)">revenue ${scenario.rev >= 0 ? "+" : ""}${scenario.rev}%/mo <input type="range" min="-10" max="10" step="1" value="${scenario.rev}" oninput="setScenario('rev',this.value)" style="vertical-align:middle"/></label>
      <label style="font-size:12px;color:var(--dim)">costs ${scenario.cost >= 0 ? "+" : ""}${scenario.cost}%/mo <input type="range" min="-10" max="10" step="1" value="${scenario.cost}" oninput="setScenario('cost',this.value)" style="vertical-align:middle"/></label>
      ${scenario.rev || scenario.cost ? `<button class="ghost" onclick="scenario={rev:0,cost:0};render()">Reset</button>` : ""}
    </div>
    ${firstNegative ? `<div class="card" style="border-color:var(--bad);background:var(--bad-bg);margin-bottom:14px"><b class="neg">Projected cash goes negative in ${firstNegative}.</b> <span style="color:var(--dim)">Tighten outflows, accelerate receivables, or arrange financing before then.</span></div>` : ""}
    <div class="card"><div class="k">Projected cash balance</div>
      <svg viewBox="0 0 ${W + 40} ${H + 44}" style="width:100%;max-width:860px;margin-top:10px">
        <polyline points="${pts}" fill="none" stroke="#34518c" stroke-width="2.5"/>
        ${rows.map((r, i) => `<circle cx="${20 + i * step}" cy="${y(r.cash)}" r="3.5" fill="${r.cash < 0 ? "#b42318" : "#34518c"}"><title>${r.m}: ${fmt$(r.cash)}</title></circle>
          <text x="${20 + i * step}" y="${H + 38}" fill="#98a2b3" font-size="10" text-anchor="middle">${r.m.slice(2)}</text>`).join("")}
      </svg></div>
    <div class="section-title" style="margin-top:18px">Month-by-month projection</div>
    <div class="tablewrap" style="max-height:none"><table><thead><tr><th>Month</th><th style="text-align:right">Inflow</th><th style="text-align:right">Outflow</th><th style="text-align:right">of which A/R due</th><th style="text-align:right">of which A/P due</th><th style="text-align:right">Net</th><th style="text-align:right">End cash</th></tr></thead><tbody>` +
      rows.map((r) => `<tr><td>${r.m}</td><td class="num pos">${fmtK(r.inflow)}</td><td class="num neg">${fmtK(r.outflow)}</td><td class="num">${r.arDue ? fmtK(r.arDue) : "—"}</td><td class="num">${r.apDue ? fmtK(r.apDue) : "—"}</td><td class="num ${r.net >= 0 ? "pos" : "neg"}">${fmtK(r.net)}</td><td class="num ${r.cash >= 0 ? "" : "neg"}"><b>${fmtK(r.cash)}</b></td></tr>`).join("") +
    `</tbody></table></div>`;
  }
  if (view === "reports") {
    const cats = {};
    const inScope = db.transactions.filter((t) => inPeriod(t.date || ""));
    for (const t of inScope) {
      const c = t.category || "Uncategorized";
      cats[c] = cats[c] || { in: 0, out: 0 };
      if (t.amount >= 0) cats[c].in += t.amount; else cats[c].out += -t.amount;
    }
    const spark = (cat) => {
      const byM = {};
      for (const t of db.transactions) {
        if (t.amount >= 0 || (t.category || "Uncategorized") !== cat) continue;
        const m = (t.date || "").slice(0, 7); if (!m) continue;
        byM[m] = (byM[m] || 0) - t.amount;
      }
      const ms = Object.keys(byM).sort().slice(-6);
      if (ms.length < 2) return "";
      const mx = Math.max(...ms.map((m) => byM[m]), 1);
      return `<svg viewBox="0 0 66 18" style="width:66px;height:18px;vertical-align:middle">` +
        ms.map((m, i) => `<rect x="${i * 11}" y="${17 - Math.max(1, (byM[m] / mx) * 16)}" width="8" height="${Math.max(1, (byM[m] / mx) * 16)}" rx="1" fill="#a8b0bd"><title>${m}: ${fmt$(byM[m])}</title></rect>`).join("") + `</svg>`;
    };
    const catRows = Object.entries(cats).sort((a, b) => (b[1].in + b[1].out) - (a[1].in + a[1].out)).map(([c, v]) =>
      `<tr><td>${c}</td><td class="num pos">${v.in ? fmt$(v.in) : "—"}</td><td class="num neg">${v.out ? fmt$(v.out) : "—"}</td><td style="text-align:right">${spark(c)}</td><td class="num ${v.in - v.out >= 0 ? "pos" : "neg"}">${fmt$(v.in - v.out)}</td></tr>`).join("");
    const totIn = Object.values(cats).reduce((s, v) => s + v.in, 0);
    const totOut = Object.values(cats).reduce((s, v) => s + v.out, 0);
    const t0 = today();
    const aging = { current: 0, d30: 0, d60: 0, d90: 0 };
    for (const i of db.invoices) {
      if (i.status === "paid" || i.status === "draft") continue;
      const days = Math.floor((new Date(t0) - new Date(i.due)) / 86400000);
      if (days <= 0) aging.current += i.amount; else if (days <= 30) aging.d30 += i.amount;
      else if (days <= 60) aging.d60 += i.amount; else aging.d90 += i.amount;
    }
    const dept = {};
    for (const t of inScope) if (t.amount < 0 && t.department) dept[t.department] = (dept[t.department] || 0) - t.amount;
    const deptRows = Object.entries(dept).sort((a, b) => b[1] - a[1]).map(([d, v]) =>
      `<tr><td>${d}</td><td class="num">${fmt$(v)}</td></tr>`).join("");
    return `<h2>Reports</h2><div class="crumb">Live from the ledger — no refresh needed. Showing: <b>${PERIODS[period]}</b></div>
    <div class="toolbar"><button onclick="window.print()">Print / save as PDF</button>${periodBar()}</div>
    <div class="section-title">Profit & loss by category</div>
    <div class="tablewrap" style="max-height:none"><table><thead><tr><th>Category</th><th style="text-align:right">In</th><th style="text-align:right">Out</th><th style="text-align:right">6-mo trend</th><th style="text-align:right">Net</th></tr></thead><tbody>${catRows}
      <tr style="font-weight:650"><td>Total</td><td class="num pos">${fmt$(totIn)}</td><td class="num neg">${fmt$(totOut)}</td><td></td><td class="num ${totIn - totOut >= 0 ? "pos" : "neg"}">${fmt$(totIn - totOut)}</td></tr>
    </tbody></table></div>
    <div class="section-title" style="margin-top:20px">Receivables aging</div>
    <div class="grid g4">
      <div class="card"><div class="k">Current</div><div class="v">${fmtK(aging.current)}</div></div>
      <div class="card"><div class="k">1–30 days</div><div class="v wrn">${fmtK(aging.d30)}</div></div>
      <div class="card"><div class="k">31–60 days</div><div class="v wrn">${fmtK(aging.d60)}</div></div>
      <div class="card"><div class="k">60+ days</div><div class="v neg">${fmtK(aging.d90)}</div></div>
    </div>
    <div class="section-title" style="margin-top:20px">Spend by department</div>
    <div class="tablewrap" style="max-height:none;max-width:480px"><table><thead><tr><th>Department</th><th style="text-align:right">Outflow</th></tr></thead><tbody>${deptRows || `<tr><td colspan="2" class="empty">No departmental spend tagged yet.</td></tr>`}</tbody></table></div>
    ${cashflowChart()}`;
  }
  if (view === "close") {
    const m = thisMonth();
    if (!db.closedMonths) db.closedMonths = [];
    const uncategorized = db.transactions.filter((t) => !t.category || t.category === "General" || t.category === "Imported" || t.category === "Uncategorized");
    const noDept = db.transactions.filter((t) => t.amount < 0 && !t.department);
    const overdueInv = db.invoices.filter((i) => i.status === "overdue");
    const pastDueBills = db.bills.filter((b) => b.status === "open" && b.due && b.due < today());
    const pendingAp = db.approvals.filter((a) => a.status === "pending");
    const staleTasks = db.tasks.filter((t) => t.status === "open" && t.due && t.due < today());
    const items = [
      { n: uncategorized.length, label: "uncategorized transactions", fix: "goLedgerFilter('category','General')", hint: "Assign real categories (or add an auto-categorize rule)" },
      { n: noDept.length, label: "outflows missing a department", fix: "location.hash='ledger'", hint: "Bulk-select in the ledger and set a department" },
      { n: overdueInv.length, label: "overdue invoices", fix: "location.hash='invoices'", hint: "Collection tasks were created by the watchdog" },
      { n: pastDueBills.length, label: "bills past due", fix: "location.hash='bills'", hint: "Pay or dispute before close" },
      { n: pendingAp.length, label: "pending approvals", fix: "location.hash='approvals'", hint: "Approve or reject to clear the queue" },
      { n: staleTasks.length, label: "overdue open tasks", fix: "location.hash='tasks'", hint: "Complete or reschedule" },
    ];
    const openCount = items.reduce((s, i) => s + (i.n > 0 ? 1 : 0), 0);
    const closed = db.closedMonths.includes(m);
    return `<h2>Month-end close — ${m}</h2>
    <div class="crumb">${closed ? "This month is marked closed." : openCount === 0 ? "All checks pass — ready to close." : openCount + " of " + items.length + " checks need attention before closing."}</div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(340px,1fr))">` +
      items.map((i) => `<div class="card intcard">
        <div class="logo" style="background:${i.n ? "#b54708" : "#3d6b47"}">${i.n ? i.n : "✓"}</div>
        <div style="flex:1"><b>${i.n ? i.n + " " : "No "}${i.label}</b><div style="font-size:12px;color:var(--dim)">${i.hint}</div></div>
        ${i.n ? `<button onclick="${i.fix};">Review</button>` : ""}
      </div>`).join("") + `</div>
    <div style="margin-top:18px">
      ${closed
        ? `<span class="tag ok">Closed</span>`
        : `<button class="primary" onclick="closeMonth()" ${openCount ? 'title="You can close with open items, but they will be noted in the audit trail"' : ""}>Mark ${m} closed</button>`}
    </div>`;
  }
  if (view === "departments") {
    const spendByDept = {};
    for (const t of db.transactions) if (t.amount < 0 && t.department) spendByDept[t.department] = (spendByDept[t.department] || 0) - t.amount;
    return `<h2>Departments</h2><div class="crumb">Cost centers — spend rolls up from the ledger's department tag.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('departments')">+ Department</button></div>
    ${tbl("departments", [["Name","name"],["Lead","lead"],["Headcount","headcount"],["Ledger spend",""],["Source"]], (d) =>
      `<td>${editable("departments",d,"name")}</td><td>${editable("departments",d,"lead")}</td><td class="num">${Number(d.headcount).toLocaleString()}</td><td class="num">${fmt$(spendByDept[d.name] || 0)}</td><td>${srcTag(d)}</td>`)}`;
  }
  if (view === "tasks") {
    return `<h2>Tasks</h2><div class="crumb">Automation rules create collection and follow-up tasks here automatically.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('tasks')">+ Task</button></div>
    ${tbl("tasks", [["Title","title"],["Assignee","assignee"],["Due","due"],["Linked","linked"],["Status","status"],["Source"],["",""]], (t) =>
      `<td>${editable("tasks",t,"title")}</td><td>${editable("tasks",t,"assignee")}</td><td>${t.due}</td><td>${t.linked||"—"}</td><td>${stTag(t.status)}</td><td>${srcTag(t)}</td>
       <td>${t.status === "open" ? `<button onclick="event.stopPropagation();completeTask('${t.id}')">Done</button>` : ""}</td>`)}`;
  }
  if (view === "customers") {
    return `<h2>Customers</h2><div class="toolbar" style="margin-top:12px"><button class="primary" onclick="addForm('customers')">+ Customer</button></div>
    ${tbl("customers", [["Name","name"],["Email","email"],["Phone","phone"],["Terms","terms"],["Owner","owner"],["Source"]], (c) =>
      `<td>${editable("customers",c,"name")}</td><td>${editable("customers",c,"email")}</td><td>${editable("customers",c,"phone")}</td><td>${editable("customers",c,"terms")}</td><td>${editable("customers",c,"owner")}</td><td>${srcTag(c)}</td>`)}`;
  }
  if (view === "vendors") {
    return `<h2>Vendors</h2><div class="toolbar" style="margin-top:12px"><button class="primary" onclick="addForm('vendors')">+ Vendor</button></div>
    ${tbl("vendors", [["Name","name"],["Email","email"],["Category","category"],["Terms","terms"],["Source"]], (v) =>
      `<td>${editable("vendors",v,"name")}</td><td>${editable("vendors",v,"email")}</td><td>${editable("vendors",v,"category")}</td><td>${editable("vendors",v,"terms")}</td><td>${srcTag(v)}</td>`)}`;
  }
  if (view === "inventory") {
    const value = db.products.reduce((s, p) => s + p.stock * p.unitCostUsd, 0);
    const low = db.products.filter((p) => p.stock <= p.reorderPoint).length;
    return `<h2>Inventory</h2><div class="crumb">Stock value ${fmt$(value)} · ${low} SKU(s) at or below reorder point — the auto-reorder rule raises POs for these.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('products')">+ Product</button></div>
    ${tbl("products", [["SKU","sku"],["Name","name"],["Unit cost","unitCostUsd"],["Stock","stock"],["Reorder at","reorderPoint"],["Reorder qty","reorderQty"],["Vendor","vendor"],["Status",""]], (p) =>
      `<td style="font-family:var(--mono);font-size:11.5px">${p.sku}</td><td>${editable("products",p,"name")}</td><td class="num">${fmt$(p.unitCostUsd)}</td><td class="num">${editable("products",p,"stock",{num:false})}</td><td class="num">${p.reorderPoint.toLocaleString()}</td><td class="num">${p.reorderQty.toLocaleString()}</td><td><a class="link" onclick="event.stopPropagation();drillByName('vendors','${p.vendor}')">${p.vendor}</a></td>
       <td>${p.stock <= p.reorderPoint ? `<span class="tag bad">low stock</span>` : `<span class="tag ok">ok</span>`}</td>`)}`;
  }
  if (view === "purchasing") {
    const openVal = db.purchaseOrders.filter((p) => p.status === "open").reduce((s, p) => s + p.totalUsd, 0);
    return `<h2>Purchase orders</h2><div class="crumb">${fmt$(openVal)} on order. Receiving a PO adds stock and creates the payable bill automatically.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('purchaseOrders')">+ Purchase order</button></div>
    ${tbl("purchaseOrders", [["Number","number"],["Vendor","vendor"],["SKU","sku"],["Qty","qty"],["Unit cost","unitCostUsd"],["Total","totalUsd"],["Ordered","ordered"],["Status","status"],["Source"],["",""]], (p) =>
      `<td>${p.number}</td><td>${p.vendor}</td><td style="font-family:var(--mono);font-size:11.5px">${p.sku}</td><td class="num">${(p.qty||0).toLocaleString()}</td><td class="num">${fmt$(p.unitCostUsd||0)}</td><td class="num">${fmt$(p.totalUsd ?? (p.qty*p.unitCostUsd) ?? 0)}</td><td>${p.ordered}</td><td>${stTag(p.status)}</td><td>${srcTag(p)}</td>
       <td>${p.status === "open" ? `<button onclick="event.stopPropagation();receivePO('${p.id}')">Receive</button>` : ""}</td>`)}`;
  }
  if (view === "salesorders") {
    const openVal = db.salesOrders.filter((s) => s.status === "open").reduce((s, x) => s + x.totalUsd, 0);
    return `<h2>Sales orders</h2><div class="crumb">${fmt$(openVal)} open. Fulfilling decrements stock and issues the customer invoice automatically.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('salesOrders')">+ Sales order</button></div>
    ${tbl("salesOrders", [["Number","number"],["Customer","customer"],["SKU","sku"],["Qty","qty"],["Unit price","unitPriceUsd"],["Total","totalUsd"],["Ordered","ordered"],["Status","status"],["Source"],["",""]], (s) =>
      `<td>${s.number}</td><td><a class="link" onclick="event.stopPropagation();drillByName('customers','${s.customer}')">${s.customer}</a></td><td style="font-family:var(--mono);font-size:11.5px">${s.sku}</td><td class="num">${(s.qty||0).toLocaleString()}</td><td class="num">${fmt$(s.unitPriceUsd||0)}</td><td class="num">${fmt$(s.totalUsd||0)}</td><td>${s.ordered}</td><td>${stTag(s.status)}</td><td>${srcTag(s)}</td>
       <td>${s.status === "open" ? `<button onclick="event.stopPropagation();fulfillSO('${s.id}')">Fulfill</button>` : ""}</td>`)}`;
  }
  if (view === "employees") {
    const semiMonthly = db.employees.reduce((s, e) => s + (Number(e.salary) || 0) / 24, 0);
    return `<h2>Employees</h2><div class="crumb">Semi-monthly payroll cost: <b>${fmt$(semiMonthly)}</b> — posts one ledger entry per department.</div>
    <div class="toolbar"><button class="primary" onclick="addForm('employees')">+ Employee</button><button onclick="runPayroll()">Run payroll now</button></div>
    ${tbl("employees", [["Name","name"],["Role","role"],["Department","department"],["Salary","salary"],["Start","startDate"],["Source"]], (e) =>
      `<td>${editable("employees",e,"name")}</td><td>${editable("employees",e,"role")}</td><td>${e.department||"—"}</td><td class="num">${editable("employees",e,"salary",{num:true})}</td><td>${e.startDate}</td><td>${srcTag(e)}</td>`)}`;
  }
  if (view === "projects") {
    return `<h2>Projects</h2><div class="toolbar" style="margin-top:12px"><button class="primary" onclick="addForm('projects')">+ Project</button></div>
    ${tbl("projects", [["Name","name"],["Dept","department"],["Budget","budget"],["Spent","spent"],["Remaining",""],["Status","status"],["Source"]], (p) =>
      `<td>${editable("projects",p,"name")}</td><td>${p.department||"—"}</td><td class="num">${editable("projects",p,"budget",{num:true})}</td><td class="num">${editable("projects",p,"spent",{num:true})}</td><td class="num ${p.budget-p.spent<0?"neg":"pos"}">${fmt$(p.budget-p.spent)}</td><td>${stTag(p.status)}</td><td>${srcTag(p)}</td>`)}`;
  }
  if (view === "automations") {
    const desc = (r) => {
      if (r.kind === "categorize") return `When ${r.matchField} contains “${r.contains}” → category “${r.setCategory}”${r.setDepartment ? ", dept " + r.setDepartment : ""}`;
      if (r.kind === "flag_overdue") return `Mark unpaid invoices overdue after due date; create a collection task and alert`;
      if (r.kind === "approval_threshold") return `Route any payment or manual transaction ≥ ${fmt$(r.thresholdUsd)} to the approval queue`;
      if (r.kind === "alert_balance") return `Alert when ${r.account} drops below ${fmt$(r.belowUsd)}`;
      if (r.kind === "recurring") return `Post ${fmt$(r.amount)} “${r.memo}” on day ${r.day} each month (${r.account})`;
      if (r.kind === "anomaly") return `Alert when an outflow exceeds ${r.factor || 3}× its category average`;
      if (r.kind === "reorder") return `When stock ≤ reorder point and no open PO exists → raise a purchase order automatically`;
      return "";
    };
    return `<h2>Automation rules</h2><div class="crumb">These run continuously against your data — on load, after every change, and after every import.</div>
    <div class="toolbar">${Object.entries(RULE_LABELS).map(([k, l]) => `<button onclick="addRuleForm('${k}')">+ ${l}</button>`).join("")}</div>
    ${tbl("rules", [["Rule","name"],["Type","kind"],["What it does",""],["Status","enabled"],["",""]], (r) =>
      `<td><b>${r.name}</b></td><td><span class="tag acc">${RULE_LABELS[r.kind] || r.kind}</span></td><td style="color:var(--dim)">${desc(r)}</td>
       <td>${r.enabled ? `<span class="tag ok">active</span>` : `<span class="tag">paused</span>`}</td>
       <td><button onclick="event.stopPropagation();toggleRule('${r.id}')">${r.enabled ? "Pause" : "Enable"}</button></td>`)}`;
  }
  if (view === "approvals") {
    const rows = db.approvals.filter(match);
    return `<h2>Approvals</h2><div class="crumb">Anything at or above the approval threshold lands here instead of executing directly.</div>
    <div class="tablewrap"><table><thead><tr><th>Requested</th><th>What</th><th style="text-align:right">Amount</th><th>Status</th><th></th></tr></thead><tbody>` +
      (rows.map((a) => `<tr><td style="white-space:nowrap">${new Date(a.createdAt).toLocaleString()}</td><td>${a.summary}</td><td class="num ${a.amount>=0?"pos":"neg"}">${fmt$(a.amount)}</td><td>${stTag(a.status)}</td>
        <td>${a.status === "pending" ? `<button class="primary" onclick="decideApproval('${a.id}',true)">Approve</button> <button class="danger" onclick="decideApproval('${a.id}',false)">Reject</button>` : (a.decidedAt ? new Date(a.decidedAt).toLocaleDateString() : "")}</td></tr>`).join("") || `<tr><td colspan="5" class="empty">Queue is clear.</td></tr>`) +
    `</tbody></table></div>`;
  }
  if (view === "activity") {
    return `<h2>Automation activity</h2><div class="crumb">What the rules engine did, newest first.</div>
    <div class="tablewrap"><table><thead><tr><th>When</th><th>Rule</th><th>Action taken</th></tr></thead><tbody>` +
      (db.autoLog.filter((a) => !query || JSON.stringify(a).toLowerCase().includes(query)).map((a) =>
        `<tr><td style="white-space:nowrap">${new Date(a.at).toLocaleString()}</td><td><span class="tag acc">${a.rule}</span></td><td>${a.detail}</td></tr>`).join("") || `<tr><td colspan="3" class="empty">No automation activity yet.</td></tr>`) +
    `</tbody></table></div>`;
  }
  if (view === "integrations") {
    return `<h2>Integrations</h2><div class="crumb">Connect the systems this company runs on. Keys stay in your browser; imported records carry their source so every number is traceable.</div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(310px,1fr))">` +
      db.integrations.map((i) => `<div class="card intcard">
        <div class="logo" style="background:${i.color}">${i.name[0]}</div>
        <div style="flex:1"><b>${i.name}</b><div style="font-size:12px;color:var(--dim)">${i.desc}</div>
        <div style="margin-top:6px">${stTag(i.status)}${i.connectedAt ? ` <span class="tag">${i.config.env||""}</span>` : ""}</div></div>
        ${i.status === "connected"
          ? `<button onclick="disconnectIntegration('${i.key}')">Disconnect</button>`
          : `<button class="primary" onclick="connectIntegration('${i.key}')">Connect</button>`}
      </div>`).join("") + `</div>`;
  }
  if (view === "auditlog") {
    return `<h2>Audit trail</h2><div class="crumb">Every create, edit, delete, payment, import, rule change, and approval — newest first.</div>
    <div class="tablewrap"><table><thead><tr><th>When</th><th>Action</th><th>Detail</th></tr></thead><tbody>` +
      (db.audit.filter((a) => !query || JSON.stringify(a).toLowerCase().includes(query)).map((a) =>
        `<tr><td style="white-space:nowrap">${new Date(a.at).toLocaleString()}</td><td><span class="tag">${a.action}</span></td><td>${a.detail}</td></tr>`).join("") || `<tr><td colspan="3" class="empty">No activity yet.</td></tr>`) +
    `</tbody></table></div>`;
  }
  if (view === "data") {
    return `<h2>Data & backup</h2><div class="crumb">Data lives in this browser (localStorage). Export to move machines or feed the Olympus API server.</div>
    <div class="toolbar">
      <button class="primary" onclick="exportJson()">Export everything (JSON)</button>
      <button onclick="importJson()">Restore from JSON</button>
      <button class="danger" onclick="resetAll(this)">Reset to demo data</button>
    </div>
    <div class="card"><div class="k">Current dataset</div><div class="d" style="font-size:13px;margin-top:6px">
      ${db.transactions.length.toLocaleString()} transactions · ${db.invoices.length} invoices · ${db.bills.length} bills · ${db.customers.length} customers · ${db.vendors.length} vendors · ${db.employees.length} employees · ${db.projects.length} projects · ${db.rules.length} rules · ${db.audit.length} audit entries
    </div></div>`;
  }
  return `<div class="empty">Unknown view</div>`;
}
function drillByName(coll, name) {
  const rec = db[coll].find((r) => r.name === name);
  if (rec) drill(coll, rec.id);
}
function goLedgerFilter(k, v) { ledgerFilter[k] = v; location.hash = "ledger"; render(); }
function closeMonth() {
  const m = thisMonth();
  if (!db.closedMonths) db.closedMonths = [];
  if (db.closedMonths.includes(m)) return;
  db.closedMonths.push(m);
  audit("close", `Month ${m} marked closed`);
  notify(`Books closed for ${m}`, "close:" + m);
  toast(`${m} closed`); render();
}
/* Undo: ring buffer of recent states; Ctrl+Z restores the previous one. */
const undoStack = [];
function snapshot() {
  const cur = JSON.stringify(db);
  if (undoStack[undoStack.length - 1] !== cur) {
    undoStack.push(cur);
    if (undoStack.length > 15) undoStack.shift();
  }
}
function undo() {
  if (undoStack.length < 2) { toast("Nothing to undo"); return; }
  undoStack.pop();
  db = JSON.parse(undoStack[undoStack.length - 1]);
  save();
  toast("Undone — restored previous state");
  render();
}
function exportLedgerCsv() {
  const cols = ["date", "amount", "account", "counterparty", "category", "department", "memo", "ref", "source"];
  const esc = (v) => { const s = String(v ?? ""); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const lines = [cols.join(",")].concat(db.transactions.filter((t) => inPeriod(t.date || "")).map((t) => cols.map((c) => esc(t[c])).join(",")));
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "olympus-ledger-" + today() + ".csv";
  a.click();
  audit("export", `Ledger exported to CSV (${lines.length - 1} rows, ${PERIODS[period]})`);
}
function showHelp() {
  openWindow("How this console works", `
    <div class="section-title">Automated flows</div>
    <div class="hist"><b>Procure-to-pay</b>: stock ≤ reorder point → PO raised automatically → Receive adds stock + creates the bill → paying routes through the approval threshold → ledger + balances update.</div>
    <div class="hist"><b>Order-to-cash</b>: sales order → Fulfill checks stock, decrements it, and issues the invoice → Record payment posts cash and links it by reference.</div>
    <div class="hist"><b>Continuous rules</b>: auto-categorization, overdue watchdog (tasks + alerts), anomaly detection, balance floors, recurring postings — see Automation rules and the activity log.</div>
    <div class="section-title">Working the data</div>
    <div class="hist">Click any <span class="editable" style="pointer-events:none">underlined value</span> to edit in place — every change is stamped into the record's history and the audit trail.</div>
    <div class="hist">Click any row to open it in a draggable window; stack several to compare records side by side.</div>
    <div class="hist">Ledger: checkboxes select rows for bulk category/department changes or delete; period pills rescope everything; Export CSV respects the selected period.</div>
    <div class="section-title">Keyboard</div>
    <div class="kv" style="grid-template-columns:110px 1fr">
      <div class="k"><kbd>/</kbd></div><div>Focus global search</div>
      <div class="k"><kbd>Ctrl</kbd>+<kbd>K</kbd></div><div>Command palette — jump to any page or action</div>
      <div class="k"><kbd>?</kbd></div><div>This help</div>
      <div class="k"><kbd>Enter</kbd></div><div>Commit an inline edit</div>
    </div>`);
}
function exportJson() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "olympus-data-" + today() + ".json";
  a.click();
  audit("export", "Full dataset exported to JSON");
}
function importJson() {
  const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json";
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => { try { db = JSON.parse(String(r.result)); save(); toast("Dataset restored"); render(); } catch (e) { toast("Not a valid Olympus JSON export"); } };
    r.readAsText(f);
  };
  inp.click();
}
function resetAll(btn) {
  if (!btn.dataset.armed) { btn.dataset.armed = "1"; btn.textContent = "Confirm wipe & reset"; return; }
  db = seedData(); save(); runAutomations(); toast("Reset to demo data"); render();
}

/* ================= notifications ================= */
document.getElementById("bell").onclick = () => {
  const items = db.notifications.slice(0, 30).map((n) =>
    `<div class="hist" style="${n.read ? "" : "border-left-color:var(--accent);color:var(--ink)"}">${new Date(n.at).toLocaleString()} — ${n.text}</div>`).join("") || `<div class="empty">No notifications.</div>`;
  const w = openWindow("Notifications", items + `<div style="margin-top:12px"><button onclick="markAllRead(this)">Mark all read</button></div>`);
  w.style.left = "auto"; w.style.right = "18px"; w.style.top = "60px";
};
function markAllRead(btn) {
  db.notifications.forEach((n) => n.read = true); save();
  btn.closest(".win").remove(); render();
}

/* ================= command palette ================= */
const palette = document.getElementById("palette");
const palinput = document.getElementById("palinput");
const palopts = document.getElementById("palopts");
let palSel = 0;
function palCommands() {
  const nav = Object.entries(VIEWS).map(([k, v]) => ({ label: "Go to " + v.label, hint: "page", run: () => { location.hash = k; } }));
  const acts = [
    { label: "New transaction", hint: "action", run: () => addForm("transactions") },
    { label: "New invoice", hint: "action", run: () => addForm("invoices") },
    { label: "New bill", hint: "action", run: () => addForm("bills") },
    { label: "New task", hint: "action", run: () => addForm("tasks") },
    { label: "Import CSV", hint: "action", run: importCsv },
    { label: "Run automation rules now", hint: "action", run: () => { const c = runAutomations(); toast(c ? "Rules ran — changes applied" : "Rules ran — nothing to do"); render(); } },
    { label: "Export data (JSON)", hint: "action", run: exportJson },
  ];
  return [...acts, ...nav];
}
function palRender() {
  const q = palinput.value.toLowerCase();
  const cmds = palCommands().filter((c) => c.label.toLowerCase().includes(q));
  palSel = Math.min(palSel, Math.max(0, cmds.length - 1));
  palopts.innerHTML = cmds.map((c, i) =>
    `<div class="opt ${i === palSel ? "sel" : ""}" data-i="${i}">${c.label}<span class="hint">${c.hint}</span></div>`).join("") || `<div class="empty">No matches</div>`;
  palopts.querySelectorAll(".opt").forEach((el) => {
    el.onclick = () => { palClose(); cmds[Number(el.dataset.i)].run(); };
  });
  return cmds;
}
function palOpen() { palette.style.display = "flex"; palinput.value = ""; palSel = 0; palRender(); palinput.focus(); }
function palClose() { palette.style.display = "none"; }
palette.onclick = (e) => { if (e.target === palette) palClose(); };
palinput.oninput = () => { palSel = 0; palRender(); };
palinput.onkeydown = (e) => {
  const cmds = palCommands().filter((c) => c.label.toLowerCase().includes(palinput.value.toLowerCase()));
  if (e.key === "ArrowDown") { palSel = Math.min(palSel + 1, cmds.length - 1); palRender(); e.preventDefault(); }
  if (e.key === "ArrowUp") { palSel = Math.max(palSel - 1, 0); palRender(); e.preventDefault(); }
  if (e.key === "Enter" && cmds[palSel]) { palClose(); cmds[palSel].run(); }
  if (e.key === "Escape") palClose();
};
document.addEventListener("keydown", (ev) => {
  if (ev.target.classList && ev.target.classList.contains("editable") && ev.key === "Enter") { ev.preventDefault(); ev.target.blur(); return; }
  if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === "k") { ev.preventDefault(); palOpen(); return; }
  if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === "z" && !/INPUT|TEXTAREA|SELECT/.test(ev.target.tagName) && !ev.target.isContentEditable) { ev.preventDefault(); undo(); return; }
  if (ev.key === "/" && !/INPUT|TEXTAREA|SELECT/.test(ev.target.tagName) && !ev.target.isContentEditable) {
    ev.preventDefault(); document.getElementById("search").focus();
  }
  if (ev.key === "?" && !/INPUT|TEXTAREA|SELECT/.test(ev.target.tagName) && !ev.target.isContentEditable) {
    ev.preventDefault(); showHelp();
  }
  if (ev.key === "Escape") palClose();
});

/* ================= shell ================= */
function render() {
  save();
  snapshot();
  document.getElementById("companyName").textContent = "· " + db.companyMeta[0].name;
  const unread = db.notifications.filter((n) => !n.read).length;
  document.getElementById("bell").innerHTML = "🔔" + (unread ? `<span class="cnt">${unread}</span>` : "");
  const pending = db.approvals.filter((a) => a.status === "pending").length;
  const groups = {};
  for (const [key, v] of Object.entries(VIEWS)) (groups[v.group] = groups[v.group] || []).push([key, v.label]);
  document.getElementById("nav").innerHTML = Object.entries(groups).map(([g, items]) =>
    `<div class="navgroup">${g}</div>` + items.map(([k, label]) =>
      `<a href="#${k}" class="${view === k ? "active" : ""}">${label}${k === "approvals" && pending ? ` <span class="tag warn" style="margin-left:auto">${pending}</span>` : ""}</a>`).join("")).join("");
  document.getElementById("main").innerHTML = renderView();
}
runAutomations();
render();
</script>
</body>
