<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Olympus — Business Operations</title>
<style>
:root{
  --bg:#f6f7f9; --panel:#ffffff; --panel2:#fafbfc; --line:#e4e7ec; --line2:#eef0f3;
  --ink:#1d2433; --dim:#667085; --faint:#98a2b3;
  --accent:#34518c; --accent-ink:#ffffff; --accent-soft:#eef2f9;
  --good:#067647; --good-bg:#ecfdf3; --bad:#b42318; --bad-bg:#fef3f2; --warn:#b54708; --warn-bg:#fffaeb;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",Roboto,"Helvetica Neue",sans-serif;
  --shadow:0 1px 2px rgba(16,24,40,.05);
  --shadow-lg:0 8px 24px rgba(16,24,40,.12),0 2px 6px rgba(16,24,40,.06);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.55 var(--sans);overflow:hidden}
header.top{display:flex;align-items:center;gap:16px;padding:0 20px;height:52px;background:var(--panel);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;letter-spacing:.1px}
.brand .mark{width:24px;height:24px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.brand small{color:var(--dim);font-weight:400}
#search{margin-left:auto;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:6px 12px;width:300px;font:13px var(--sans)}
#search::placeholder{color:var(--faint)}
#search:focus{outline:none;border-color:var(--accent);background:#fff}
.bell{position:relative;cursor:pointer;padding:6px 9px;border-radius:8px;border:1px solid var(--line);background:var(--panel);font-size:14px;line-height:1}
.bell:hover{background:var(--panel2)}
.bell .cnt{position:absolute;top:-6px;right:-6px;background:var(--bad);color:#fff;border-radius:99px;font-size:10px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}
#layout{display:flex;height:calc(100vh - 52px)}
nav{width:216px;background:var(--panel);border-right:1px solid var(--line);padding:10px 8px 20px;overflow-y:auto;flex-shrink:0}
nav a{display:flex;align-items:center;gap:8px;padding:6px 12px;margin:1px 0;color:var(--dim);text-decoration:none;font-size:13px;border-radius:7px;cursor:pointer}
nav a:hover{color:var(--ink);background:var(--panel2)}
nav a.active{color:var(--accent);background:var(--accent-soft);font-weight:600}
nav .navgroup{padding:16px 12px 5px;font-size:10.5px;letter-spacing:.9px;text-transform:uppercase;color:var(--faint);font-weight:600}
main{flex:1;overflow-y:auto;padding:24px 28px;position:relative}
h2{font-size:19px;margin:0 0 2px;font-weight:650;letter-spacing:-.2px}
.crumb{color:var(--dim);font-size:12.5px;margin-bottom:18px}
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow)}
.card .k{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.card .v{font-size:21px;font-weight:650;font-family:var(--mono);margin-top:3px;letter-spacing:-.3px}
.card .d{font-size:11.5px;color:var(--dim);margin-top:3px}
.pos{color:var(--good)} .neg{color:var(--bad)} .wrn{color:var(--warn)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{color:var(--dim);text-align:left;font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;padding:9px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--ink)}
th .arr{font-size:9px;margin-left:3px}
td{padding:8px 12px;border-bottom:1px solid var(--line2);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tr.row:hover{background:var(--panel2);cursor:pointer}
.num{font-family:var(--mono);text-align:right;white-space:nowrap;font-size:12px}
.tag{display:inline-block;padding:1px 8px;border-radius:6px;font-size:11px;font-weight:500;background:var(--line2);color:var(--dim);white-space:nowrap}
.tag.ok{background:var(--good-bg);color:var(--good)}
.tag.bad{background:var(--bad-bg);color:var(--bad)}
.tag.warn{background:var(--warn-bg);color:var(--warn)}
.tag.acc{background:var(--accent-soft);color:var(--accent)}
.toolbar{display:flex;gap:8px;align-items:center;margin:0 0 14px;flex-wrap:wrap}
.toolbar .spacer{flex:1}
button{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 13px;font:12.5px var(--sans);font-weight:500;cursor:pointer;box-shadow:var(--shadow)}
button:hover{background:var(--panel2);border-color:#d0d5dd}
button.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
button.primary:hover{background:#2b4477}
button.danger{color:var(--bad)}
button.ghost{border-color:transparent;box-shadow:none;background:transparent;color:var(--dim)}
button.ghost:hover{color:var(--ink);background:var(--line2)}
select,input[type=text],input[type=number],input[type=date],textarea{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:6px 10px;font:12.5px var(--sans)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.editable{border-bottom:1px dashed transparent;cursor:text;min-width:24px;display:inline-block;border-radius:2px}
.editable:hover{border-bottom-color:var(--faint);background:var(--warn-bg)}
.editable:focus{outline:none;border-bottom:1px solid var(--accent);background:var(--accent-soft)}
.win{position:absolute;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);min-width:440px;max-width:680px;max-height:76vh;display:flex;flex-direction:column;z-index:100}
.win .whead{display:flex;align-items:center;cursor:move;border-radius:12px 12px 0 0;padding:10px 16px;background:var(--panel2);border-bottom:1px solid var(--line);user-select:none;font-weight:600;font-size:13px}
.win .whead .x{margin-left:auto;cursor:pointer;color:var(--dim);font-size:15px;padding:0 4px;border-radius:4px}
.win .whead .x:hover{color:var(--bad);background:var(--bad-bg)}
.win .body{padding:16px 18px;overflow-y:auto}
.kv{display:grid;grid-template-columns:160px 1fr;gap:6px 14px;font-size:12.5px;margin-bottom:12px}
.kv .k{color:var(--dim)}
.hist{font-size:12px;color:var(--dim);border-left:2px solid var(--line);padding-left:10px;margin:5px 0}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin:16px 0 7px;font-weight:650}
.intcard{display:flex;gap:12px;align-items:center}
.intcard .logo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.formrow{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.formrow label{font-size:11.5px;color:var(--dim);font-weight:550}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;border-radius:9px;padding:10px 18px;z-index:999;font-size:12.5px;box-shadow:var(--shadow-lg)}
.empty{color:var(--faint);padding:36px;text-align:center;font-size:13px}
.tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:auto;max-height:calc(100vh - 250px);box-shadow:var(--shadow)}
a.link{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:500}
a.link:hover{text-decoration:underline}
.bar{height:7px;border-radius:99px;background:var(--line2);overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;border-radius:99px;background:var(--accent)}
.bar i.over{background:var(--bad)}
.pill-toggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.pill-toggle span{padding:4px 12px;cursor:pointer;font-size:12px;color:var(--dim)}
.pill-toggle span.on{background:var(--accent-soft);color:var(--accent);font-weight:600}
#palette{position:fixed;inset:0;background:rgba(16,24,40,.4);z-index:500;display:none;align-items:flex-start;justify-content:center;padding-top:14vh}
#palette .box{background:var(--panel);border-radius:12px;box-shadow:var(--shadow-lg);width:520px;overflow:hidden}
#palette input{width:100%;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:14px 18px;font-size:14px}
#palette .opts{max-height:320px;overflow-y:auto}
#palette .opt{padding:10px 18px;cursor:pointer;font-size:13px;display:flex;gap:10px;align-items:center}
#palette .opt.sel,#palette .opt:hover{background:var(--accent-soft)}
#palette .opt .hint{margin-left:auto;color:var(--faint);font-size:11px}
kbd{background:var(--line2);border:1px solid var(--line);border-radius:4px;padding:0 5px;font:11px var(--mono);color:var(--dim)}
@media print{
  header.top,nav,.toolbar,#windows,.bell,#quickadd{display:none!important}
  body{overflow:visible;background:#fff}
  #layout{display:block;height:auto}
  main{overflow:visible;padding:0}
  .tablewrap{max-height:none;overflow:visible;box-shadow:none}
  .card{box-shadow:none;break-inside:avoid}
}
</style>
</head>
<body>
<header class="top">
  <div class="brand"><div class="mark">O</div><div>Olympus <small id="companyName"></small></div></div>
  <div class="pill-toggle" id="quickadd" style="margin-left:8px">
    <span onclick="addForm('transactions')">+ Transaction</span><span onclick="addForm('invoices')">+ Invoice</span><span onclick="addForm('bills')">+ Bill</span>
  </div>
  <input id="search" placeholder="Search everything — press / to focus, Ctrl+K for commands" />
  <button class="ghost" onclick="showHelp()" title="Help (?)" style="font-size:14px">?</button>
  <div class="bell" id="bell" title="Notifications">🔔</div>
</header>
<div id="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<div id="windows"></div>
<div id="palette"><div class="box"><input id="palinput" placeholder="Type a page or action…" /><div class="opts" id="palopts"></div></div></div>
<script>
"use strict";
/* ================= core data ================= */
const LS_KEY = "olympus-console-v3";
const uid = () => Math.random().toString(36).slice(2, 10);
const today = () => new Date().toISOString().slice(0, 10);
const now = () => new Date().toISOString();
const thisMonth = () => today().slice(0, 7);
const fmt$ = (n) => (n < 0 ? "-$" : "$") + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
const fmtK = (n) => { const a = Math.abs(n); const s = a >= 1e9 ? (a/1e9).toFixed(1)+"B" : a >= 1e6 ? (a/1e6).toFixed(1)+"M" : a >= 1e3 ? (a/1e3).toFixed(1)+"K" : a.toFixed(0); return (n<0?"-$":"$")+s; };

function seedData() {
  const mk = (extra) => ({ id: uid(), source: "seed", createdAt: now(), history: [], ...extra });
  const txns = [];
  const flows = [
    ["2026-01", 412000, 371000], ["2026-02", 428500, 380200], ["2026-03", 445100, 401800],
    ["2026-04", 462300, 388400], ["2026-05", 471900, 415600], ["2026-06", 489200, 398900],
  ];
  for (const [m, inc, out] of flows) {
    txns.push(mk({ date: m+"-05", amount: Math.round(inc*0.62), account: "Operating — Main", category: "Product revenue", department: "Commerce", counterparty: "Marketplace settlements", memo: "Marketplace payout batch" }));
    txns.push(mk({ date: m+"-12", amount: Math.round(inc*0.23), account: "Operating — Main", category: "Subscription revenue", department: "Commerce", counterparty: "Prime memberships", memo: "Recurring membership billing" }));
    txns.push(mk({ date: m+"-19", amount: Math.round(inc*0.15), account: "Operating — Main", category: "Services revenue", department: "Cloud", counterparty: "Enterprise contracts", memo: "Cloud services invoicing" }));
    txns.push(mk({ date: m+"-01", amount: -Math.round(out*0.41), account: "Payroll", category: "Payroll", department: "People", counterparty: "Payroll run "+m, memo: "Semi-monthly payroll A" }));
    txns.push(mk({ date: m+"-15", amount: -Math.round(out*0.24), account: "Payroll", category: "Payroll", department: "People", counterparty: "Payroll run "+m, memo: "Semi-monthly payroll B" }));
    txns.push(mk({ date: m+"-08", amount: -Math.round(out*0.18), account: "Operating — Main", category: "Fulfillment", department: "Logistics", counterparty: "Regional carriers", memo: "Carrier invoices" }));
    txns.push(mk({ date: m+"-21", amount: -Math.round(out*0.11), account: "Operating — Main", category: "Cloud infrastructure", department: "Cloud", counterparty: "DataCenter West", memo: "Compute + storage" }));
    txns.push(mk({ date: m+"-26", amount: -Math.round(out*0.06), account: "Corporate card", category: "Marketing", department: "Growth", counterparty: "Ad platforms", memo: "Performance marketing" }));
  }
  txns.push(mk({ date: "2026-07-01", amount: 148200, account: "Operating — Main", category: "Product revenue", department: "Commerce", counterparty: "Marketplace settlements", memo: "Marketplace payout batch" }));
  txns.push(mk({ date: "2026-07-02", amount: -186500, account: "Payroll", category: "Payroll", department: "People", counterparty: "Payroll run 2026-07", memo: "Semi-monthly payroll A" }));
  txns.push(mk({ date: "2026-07-05", amount: -42800, account: "Operating — Main", category: "Fulfillment", department: "Logistics", counterparty: "Regional carriers", memo: "Carrier invoices" }));
  return {
    companyMeta: [{ id: "company", name: "Meridian Commerce Group", source: "seed", createdAt: now(), history: [] }],
    accounts: [
      mk({ name: "Operating — Main", type: "bank", balance: 8421055.22 }),
      mk({ name: "Operating — EU", type: "bank", balance: 2204410.90 }),
      mk({ name: "Payroll", type: "bank", balance: 1450200.00 }),
      mk({ name: "Corporate card", type: "credit", balance: -431522.10 }),
      mk({ name: "Treasury reserve", type: "bank", balance: 25000000.00 }),
    ],
    departments: [
      mk({ name: "Commerce", lead: "A. Okafor", headcount: 3120 }),
      mk({ name: "Logistics", lead: "M. Chen", headcount: 8450 }),
      mk({ name: "Cloud", lead: "S. Duval", headcount: 1980 }),
      mk({ name: "Growth", lead: "R. Patel", headcount: 640 }),
      mk({ name: "People", lead: "J. Whitfield", headcount: 310 }),
    ],
    customers: [
      mk({ name: "Northwind Traders", email: "ap@northwind.com", phone: "555-0102", terms: "Net 30", owner: "Enterprise East" }),
      mk({ name: "Fabrikam Inc", email: "billing@fabrikam.com", phone: "555-0177", terms: "Net 15", owner: "Enterprise West" }),
      mk({ name: "Contoso Ltd", email: "finance@contoso.com", phone: "555-0143", terms: "Net 45", owner: "Strategic" }),
    ],
    vendors: [
      mk({ name: "Regional carriers", email: "billing@regcarriers.com", category: "Fulfillment", terms: "Net 30" }),
      mk({ name: "DataCenter West", email: "ar@dcwest.io", category: "Cloud infrastructure", terms: "Net 30" }),
      mk({ name: "Ad platforms", email: "invoices@adplat.com", category: "Marketing", terms: "Net 15" }),
      mk({ name: "Metro Office Supply", email: "sales@metro-os.com", category: "Facilities", terms: "Due on receipt" }),
    ],
    employees: [
      mk({ name: "Jordan Ellis", role: "VP Operations", department: "Logistics", salary: 248000, startDate: "2021-03-11" }),
      mk({ name: "Sam Rivera", role: "Director, Fulfillment", department: "Logistics", salary: 196000, startDate: "2022-01-06" }),
      mk({ name: "Priya Nair", role: "Head of FP&A", department: "People", salary: 214000, startDate: "2020-09-14" }),
    ],
    projects: [
      mk({ name: "Same-day delivery expansion", department: "Logistics", budget: 12500000, spent: 4830000, status: "active" }),
      mk({ name: "Checkout latency program", department: "Commerce", budget: 2400000, spent: 2510000, status: "active" }),
      mk({ name: "EU data residency", department: "Cloud", budget: 8800000, spent: 1200000, status: "active" }),
    ],
    invoices: [
      mk({ number: "INV-98041", customer: "Northwind Traders", amount: 620000, issued: "2026-06-10", due: "2026-07-10", status: "sent" }),
      mk({ number: "INV-98042", customer: "Fabrikam Inc", amount: 345000, issued: "2026-05-18", due: "2026-06-02", status: "sent" }),
      mk({ number: "INV-98039", customer: "Contoso Ltd", amount: 880000, issued: "2026-05-02", due: "2026-06-16", status: "paid" }),

      mk({ number: "BILL-5522", vendor: "Regional carriers", amount: 388400, received: "2026-06-28", due: "2026-07-12", status: "open", category: "Fulfillment", department: "Logistics" }),
      mk({ number: "BILL-5509", vendor: "Ad platforms", amount: 96500, received: "2026-06-01", due: "2026-06-16", status: "paid", category: "Marketing", department: "Growth" }),

    ],

      mk({ name: "Flag overdue invoices", kind: "flag_overdue", graceDays: 0, enabled: true }),
      mk({ name: "Approval for large outflows", kind: "approval_threshold", thresholdUsd: 250000, enabled: true }),
      mk({ name: "Low-balance alert — Payroll", kind: "alert_balance", account: "Payroll", belowUsd: 1000000, enabled: true }),
      mk({ name: "Monthly office lease", kind: "recurring", day: 1, amount: -84000, account: "Operating — Main", category: "Facilities", department: "People", counterparty: "Harborview Properties", memo: "HQ + regional office leases", lastRun: thisMonth(), enabled: true }),
      mk({ name: "Unusual spend detector", kind: "anomaly", factor: 3, enabled: true }),
    ],
    approvals: [],
    notifications: [],
    notifKeys: [],
    autoLog: [],
    integrations: [
      { key: "quickbooks", name: "QuickBooks Online", color: "#2ca01c", desc: "Chart of accounts, invoices, bills, payments", status: "disconnected", config: {} },
      { key: "netsuite", name: "NetSuite", color: "#1f6bb0", desc: "ERP master records and consolidation", status: "disconnected", config: {} },
      { key: "sap", name: "SAP S/4HANA", color: "#1870c5", desc: "Enterprise financials and supply chain", status: "disconnected", config: {} },
      { key: "xero", name: "Xero", color: "#13b5ea", desc: "Accounting sync — ledgers and contacts", status: "disconnected", config: {} },
      { key: "stripe", name: "Stripe", color: "#635bff", desc: "Payments, payouts, subscriptions", status: "disconnected", config: {} },

      { key: "adp", name: "ADP", color: "#d0271d", desc: "Enterprise payroll and HR", status: "disconnected", config: {} },
      { key: "workday", name: "Workday", color: "#f38b00", desc: "HCM, headcount, and compensation", status: "disconnected", config: {} },

      { key: "snowflake", name: "Snowflake", color: "#29b5e8", desc: "Warehouse-scale analytics export", status: "disconnected", config: {} },
    ],
    audit: [],
    products: [
      { id: uid(), source: "seed", createdAt: now(), history: [], sku: "PKG-CORR-L", name: "Corrugated boxes — large", unitCostUsd: 1.84, stock: 12400, reorderPoint: 15000, reorderQty: 40000, vendor: "Metro Office Supply" },
      { id: uid(), source: "seed", createdAt: now(), history: [], sku: "PKG-MAILER-P", name: "Poly mailers", unitCostUsd: 0.22, stock: 88000, reorderPoint: 50000, reorderQty: 200000, vendor: "Metro Office Supply" },
      { id: uid(), source: "seed", createdAt: now(), history: [], sku: "LBL-THERM-4x6", name: "Thermal labels 4x6", unitCostUsd: 0.031, stock: 240000, reorderPoint: 100000, reorderQty: 500000, vendor: "Metro Office Supply" },
      { id: uid(), source: "seed", createdAt: now(), history: [], sku: "DEV-SCAN-X2", name: "Handheld scanners X2", unitCostUsd: 289, stock: 42, reorderPoint: 60, reorderQty: 150, vendor: "DataCenter West" },
    ],
    purchaseOrders: [],
    salesOrders: [
      { id: uid(), source: "seed", createdAt: now(), history: [], number: "SO-30112", customer: "Northwind Traders", sku: "PKG-CORR-L", qty: 5000, unitPriceUsd: 2.95, totalUsd: 14750, status: "open", ordered: "2026-07-03" },
    ],
  };
}
let db = (() => { try { const raw = localStorage.getItem(LS_KEY); if (raw) return JSON.parse(raw); } catch (e) {} return seedData(); })();
/* Migrate datasets saved by earlier versions of this page. */
(function migrate() {
  const seed = seedData();
  for (const k of ["products", "purchaseOrders", "salesOrders"]) if (!db[k]) db[k] = seed[k];
  if (!db.rules.some((r) => r.kind === "reorder")) {
    db.rules.push({ id: uid(), source: "seed", createdAt: now(), history: [], name: "Auto-reorder low stock", kind: "reorder", enabled: true });
  }
})();
function save() { localStorage.setItem(LS_KEY, JSON.stringify(db)); }
function audit(action, detail) {
  db.audit.unshift({ at: now(), action, detail });
  if (db.audit.length > 1000) db.audit.pop();
  save();
}
function toast(msg) {
  const t = document.createElement("div"); t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2600);
}
function notify(text, key) {
  if (key) { if (db.notifKeys.includes(key)) return; db.notifKeys.push(key); if (db.notifKeys.length > 800) db.notifKeys.shift(); }
  db.notifications.unshift({ id: uid(), at: now(), text, read: false });
  if (db.notifications.length > 200) db.notifications.pop();
}

/* ================= automation engine ================= */
function logAuto(rule, detail) {
  db.autoLog.unshift({ at: now(), rule: rule.name, detail });
  if (db.autoLog.length > 300) db.autoLog.pop();
}
function runAutomations() {
  let changed = false;
  for (const rule of db.rules) {
    if (!rule.enabled) continue;
    if (rule.kind === "categorize") {
      for (const t of db.transactions) {
        if (t.autoTagged) continue;
        const hay = String(t[rule.matchField] || "").toLowerCase();
        if (hay.includes(String(rule.contains).toLowerCase())) {
          if (rule.setCategory && t.category !== rule.setCategory) { t.category = rule.setCategory; changed = true; }
          if (rule.setDepartment && t.department !== rule.setDepartment) { t.department = rule.setDepartment; changed = true; }
          t.autoTagged = true;
          logAuto(rule, `tagged ${t.memo || t.counterparty} → ${rule.setCategory || ""} ${rule.setDepartment || ""}`);
        }
      }
    }
    if (rule.kind === "flag_overdue") {
      for (const i of db.invoices) {
        if (i.status === "sent" && i.due && i.due < today()) {
          i.status = "overdue"; changed = true;
          notify(`Invoice ${i.number} (${i.customer}, ${fmt$(i.amount)}) is overdue`, "ov:" + i.number);
          db.tasks.unshift({ id: uid(), source: "automation", createdAt: now(), history: [], title: `Chase overdue ${i.number} — ${i.customer}`, assignee: "AR team", due: today(), status: "open", linked: i.number });
          logAuto(rule, `${i.number} marked overdue; collection task created`);
        }
      }
      for (const b of db.bills) {
        if (b.status === "open" && b.due && b.due < today()) {
          notify(`Bill ${b.number} (${b.vendor}, ${fmt$(b.amount)}) is past due`, "bv:" + b.number);
        }
      }
    }
    if (rule.kind === "alert_balance") {
      const acct = db.accounts.find((a) => a.name === rule.account);
      if (acct && acct.balance < rule.belowUsd) {
        notify(`${acct.name} balance ${fmt$(acct.balance)} is below the ${fmt$(rule.belowUsd)} floor`, "bal:" + acct.name + ":" + thisMonth());
        logAuto(rule, `${acct.name} below floor`);
      }
    }
    if (rule.kind === "reorder") {
      for (const p of db.products) {
        if (p.stock > p.reorderPoint) continue;
        const open = db.purchaseOrders.some((po) => po.sku === p.sku && po.status === "open");
        if (open) continue;
        const po = { id: uid(), source: "automation", createdAt: now(), history: [],
          number: "PO-" + String(1000 + db.purchaseOrders.length + 1), vendor: p.vendor, sku: p.sku,
          qty: p.reorderQty, unitCostUsd: p.unitCostUsd, totalUsd: Math.round(p.reorderQty * p.unitCostUsd * 100) / 100,
          status: "open", ordered: today() };
        db.purchaseOrders.unshift(po);
        changed = true;
        notify(`Auto-reorder: ${po.number} for ${p.reorderQty.toLocaleString()} × ${p.sku} (${fmt$(po.totalUsd)}) — stock ${p.stock.toLocaleString()} ≤ reorder point ${p.reorderPoint.toLocaleString()}`, "po:" + p.sku + ":" + po.number);
        logAuto(rule, `created ${po.number}: ${p.reorderQty.toLocaleString()} × ${p.sku} from ${p.vendor}`);
      }
    }
    if (rule.kind === "anomaly") {
      const stats = {};
      for (const t of db.transactions) {
        if (t.amount >= 0) continue;
        const c = t.category || "Uncategorized";
        (stats[c] = stats[c] || []).push(-t.amount);
      }
      for (const t of db.transactions) {
        if (t.amount >= 0 || t.anomalyChecked) continue;
        t.anomalyChecked = true;
        const arr = stats[t.category || "Uncategorized"] || [];
        if (arr.length < 4) continue;
        const avg = (arr.reduce((s, x) => s + x, 0) - (-t.amount)) / (arr.length - 1);
        if (-t.amount > avg * (rule.factor || 3)) {
          changed = true;
          notify(`Unusual outflow: ${fmt$(t.amount)} to ${t.counterparty || "?"} is ${Math.round(-t.amount / avg)}× the ${t.category} average`, "anom:" + t.id);
          logAuto(rule, `flagged ${fmt$(t.amount)} (${t.category}) vs avg ${fmt$(-avg)}`);
        }
      }
    }
    if (rule.kind === "recurring") {
      const m = thisMonth();
      const dom = Number(today().slice(8, 10));
      if (rule.lastRun !== m && dom >= rule.day) {
        db.transactions.unshift({ id: uid(), source: "automation", createdAt: now(), history: [],
          date: m + "-" + String(rule.day).padStart(2, "0"), amount: rule.amount,
          account: rule.account, category: rule.category, department: rule.department || "",
          counterparty: rule.counterparty, memo: rule.memo });
        rule.lastRun = m; changed = true;
        notify(`Recurring: posted ${fmt$(rule.amount)} — ${rule.memo}`, "rec:" + rule.id + ":" + m);
        logAuto(rule, `posted ${fmt$(rule.amount)} for ${m}`);
      }
    }
  }
  if (changed) save();
  return changed;
}
function approvalThreshold() {
  const r = db.rules.find((r) => r.kind === "approval_threshold" && r.enabled);
  return r ? r.thresholdUsd : Infinity;
}

/* ================= edit-in-place ================= */
function editable(coll, rec, field, opts = {}) {
  const isNum = opts.num;
  const val = rec[field] ?? "";
  const shown = isNum && val !== "" ? fmt$(Number(val)) : String(val);
  return `<span class="editable" contenteditable="true" data-coll="${coll}" data-id="${rec.id}" data-field="${field}" data-num="${isNum ? 1 : 0}">${shown}</span>`;
}
document.addEventListener("blur", (ev) => {
  const el = ev.target;
  if (!el.classList || !el.classList.contains("editable")) return;
  const { coll, id, field } = el.dataset;
  const rec = db[coll].find((r) => r.id === id);
  if (!rec) return;
  let nv = el.textContent.trim();
  const old = rec[field];
  if (el.dataset.num === "1" || typeof old === "number") nv = Number(String(nv).replace(/[$,]/g, "")) || 0;
  if (String(old) === String(nv)) { el.textContent = el.dataset.num === "1" ? fmt$(Number(old)) : String(old ?? ""); return; }
  rec.history = rec.history || [];
  rec.history.push({ at: now(), field, from: old, to: nv, by: "operator" });
  rec[field] = nv;
  if (rec.source === "seed") rec.source = "manual";
  audit("edit", `${coll}/${rec.name || rec.number || rec.title || rec.memo || rec.id}: ${field} ${JSON.stringify(old)} → ${JSON.stringify(nv)}`);
  toast("Saved");
  render();
}, true);

/* ================= windows ================= */
let zTop = 100;
function openWindow(title, bodyHtml) {
  const host = document.getElementById("windows");
  const w = document.createElement("div");
  w.className = "win";
  const n = host.children.length;
  w.style.left = (140 + n * 36) + "px";
  w.style.top = (86 + n * 32) + "px";
  w.style.zIndex = ++zTop;
  w.innerHTML = `<div class="whead">${title}<span class="x" title="Close">✕</span></div><div class="body">${bodyHtml}</div>`;
  w.querySelector(".x").onclick = () => w.remove();
  w.onmousedown = () => { w.style.zIndex = ++zTop; };
  const h = w.querySelector(".whead");
  h.onmousedown = (e) => {
    if (e.target.classList.contains("x")) return;
    const sx = e.clientX - w.offsetLeft, sy = e.clientY - w.offsetTop;
    const mv = (e2) => { w.style.left = (e2.clientX - sx) + "px"; w.style.top = Math.max(54, e2.clientY - sy) + "px"; };
    const up = () => { document.removeEventListener("mousemove", mv); document.removeEventListener("mouseup", up); };
    document.addEventListener("mousemove", mv); document.addEventListener("mouseup", up);
  };
  host.appendChild(w);
  return w;
}
function provenanceHtml(rec) {
  const hist = (rec.history || []).slice().reverse().map((h) =>
    `<div class="hist">${new Date(h.at).toLocaleString()} — <b>${h.field}</b>: <i>${h.from ?? "—"}</i> → <i>${h.to}</i> (${h.by})</div>`).join("") || `<div class="hist">No edits since creation.</div>`;
  return `<div class="section-title">Provenance</div>
    <div class="kv"><div class="k">Source</div><div><span class="tag acc">${rec.source || "manual"}</span></div>
    <div class="k">Created</div><div>${new Date(rec.createdAt).toLocaleString()}</div>
    <div class="k">Record ID</div><div style="font-family:var(--mono);font-size:11px">${rec.id}</div></div>
    <div class="section-title">Change history</div>${hist}`;
}
function drill(coll, id) {
  const rec = db[coll].find((r) => r.id === id);
  if (!rec) return;
  const skip = new Set(["id", "source", "createdAt", "history", "autoTagged"]);
  const rows = Object.keys(rec).filter((k) => !skip.has(k)).map((k) => {
    const isNum = typeof rec[k] === "number" && /amount|balance|salary|budget|spent|monthlyUsd|thresholdUsd|belowUsd|headcount/.test(k);
    return `<div class="k">${k}</div><div>${editable(coll, rec, k, { num: isNum })}</div>`;
  }).join("");
  let poActions = "";
  if (coll === "purchaseOrders" && rec.status === "open") poActions = `<button class="primary" onclick="receivePO('${rec.id}',this)">Receive into stock (${fmt$(rec.totalUsd)})</button> `;
  if (coll === "salesOrders" && rec.status === "open") poActions = `<button class="primary" onclick="fulfillSO('${rec.id}',this)">Fulfill & invoice (${fmt$(rec.totalUsd)})</button> `;
  let statement = "";
  if (coll === "customers") {
    const open = db.invoices.filter((i) => i.customer === rec.name && (i.status === "sent" || i.status === "overdue"));
    const paid = db.invoices.filter((i) => i.customer === rec.name && i.status === "paid");
    statement = `<div class="section-title">Statement</div><div class="kv">
      <div class="k">Open balance</div><div class="num" style="text-align:left"><b>${fmt$(open.reduce((s, i) => s + i.amount, 0))}</b> across ${open.length} invoice(s)</div>
      <div class="k">Lifetime paid</div><div>${fmt$(paid.reduce((s, i) => s + i.amount, 0))} across ${paid.length} invoice(s)</div></div>` +
      open.map((i) => `<div class="hist"><a class="link" onclick="drill('invoices','${i.id}')">${i.number} · ${fmt$(i.amount)} · due ${i.due} · ${i.status}</a></div>`).join("");
  }
  if (coll === "vendors") {
    const open = db.bills.filter((b) => b.vendor === rec.name && b.status === "open");
    const paid = db.bills.filter((b) => b.vendor === rec.name && b.status === "paid");
    statement = `<div class="section-title">Statement</div><div class="kv">
      <div class="k">Owed to vendor</div><div><b>${fmt$(open.reduce((s, b) => s + b.amount, 0))}</b> across ${open.length} bill(s)</div>
      <div class="k">Lifetime paid</div><div>${fmt$(paid.reduce((s, b) => s + b.amount, 0))} across ${paid.length} bill(s)</div></div>` +
      open.map((b) => `<div class="hist"><a class="link" onclick="drill('bills','${b.id}')">${b.number} · ${fmt$(b.amount)} · due ${b.due}</a></div>`).join("");
  }
  let related = "";
  const nm = rec.name || rec.number;
  if (nm) {
    const rel = db.transactions.filter((t) => t.id !== rec.id && (t.counterparty === nm || t.ref === nm || t.account === nm));
    if (rel.length) {
      related = `<div class="section-title">Linked money movement</div>` + rel.slice(0, 8).map((t) =>
        `<div class="hist"><a class="link" onclick="drill('transactions','${t.id}')">${t.date} · ${fmt$(t.amount)} · ${t.memo}</a></div>`).join("");
    }
  }
  let actions = "";
  if (coll === "invoices" && rec.status !== "paid") actions += `<button class="primary" onclick="recordPayment('${rec.id}',this)">✓ Record payment (${fmt$(rec.amount)})</button> `;
  if (coll === "bills" && rec.status !== "paid") actions += `<button class="primary" onclick="payBill('${rec.id}',this)">Pay bill (${fmt$(rec.amount)})</button> `;
  if (coll === "tasks" && rec.status === "open") actions += `<button class="primary" onclick="completeTask('${rec.id}',this)">Mark complete</button> `;
  openWindow(`${coll.slice(0, -1)} — ${rec.name || rec.number || rec.title || rec.memo || rec.id}`,
    `<div class="kv">${rows}</div>${statement}${related}${provenanceHtml(rec)}
     <div style="margin-top:14px">${poActions}${actions}<button class="danger" onclick="delRec('${coll}','${rec.id}',this)">Delete</button></div>`);
}
function delRec(coll, id, btn) {
  const rec = db[coll].find((r) => r.id === id);
  if (!rec) return;
  if (!btn.dataset.armed) { btn.dataset.armed = "1"; btn.textContent = "Confirm delete"; return; }
  db[coll] = db[coll].filter((r) => r.id !== id);
  audit("delete", `${coll}: removed ${rec.name || rec.number || rec.title || rec.memo || id}`);
  btn.closest(".win").remove();
  toast("Deleted"); render();
}

/* ================= money actions ================= */
function recordPayment(invoiceId, btn) {
  const inv = db.invoices.find((i) => i.id === invoiceId);
  if (!inv || inv.status === "paid") return;
  inv.history.push({ at: now(), field: "status", from: inv.status, to: "paid", by: "operator" });
  inv.status = "paid";
  const bank = db.accounts.find((a) => a.type === "bank") || db.accounts[0];
  db.transactions.unshift({ id: uid(), source: "manual", createdAt: now(), history: [],
    date: today(), amount: inv.amount, account: bank ? bank.name : "Undeposited",
    category: "Product revenue", department: "", counterparty: inv.customer, memo: "Payment for " + inv.number, ref: inv.number });
  if (bank) bank.balance = Math.round((bank.balance + inv.amount) * 100) / 100;
  audit("payment", `${inv.number}: ${fmt$(inv.amount)} received from ${inv.customer}`);
  if (btn) btn.closest(".win").remove();
  toast(`Payment recorded — ${fmt$(inv.amount)}`); render();
}
function payBill(billId, btn) {
  const bill = db.bills.find((b) => b.id === billId);
  if (!bill || bill.status === "paid") return;
  const amt = -Math.abs(bill.amount);
  if (Math.abs(amt) >= approvalThreshold()) {
    db.approvals.unshift({ id: uid(), createdAt: now(), kind: "bill_payment", refId: bill.id,
      summary: `Pay ${bill.number} — ${bill.vendor}`, amount: amt, status: "pending", requestedBy: "operator" });
    notify(`Approval requested: pay ${bill.number} (${fmt$(bill.amount)}) — over the ${fmt$(approvalThreshold())} threshold`, "apr:" + bill.id);
    audit("approval", `Payment for ${bill.number} routed to approvals (${fmt$(bill.amount)})`);
    if (btn) btn.closest(".win").remove();
    toast("Routed to Approvals — exceeds auto-pay threshold"); render(); return;
  }
  executeBillPayment(bill);
  if (btn) btn.closest(".win").remove();
  toast(`Bill paid — ${fmt$(bill.amount)}`); render();
}
function executeBillPayment(bill) {
  bill.history.push({ at: now(), field: "status", from: bill.status, to: "paid", by: "operator" });
  bill.status = "paid";
  const bank = db.accounts.find((a) => a.type === "bank") || db.accounts[0];
  db.transactions.unshift({ id: uid(), source: "manual", createdAt: now(), history: [],
    date: today(), amount: -Math.abs(bill.amount), account: bank ? bank.name : "Operating",
    category: bill.category || "Accounts payable", department: bill.department || "", counterparty: bill.vendor, memo: "Payment of " + bill.number, ref: bill.number });
  if (bank) bank.balance = Math.round((bank.balance - Math.abs(bill.amount)) * 100) / 100;
  audit("payment", `${bill.number}: paid ${fmt$(bill.amount)} to ${bill.vendor}`);
}
function decideApproval(id, ok) {
  const ap = db.approvals.find((a) => a.id === id);
  if (!ap || ap.status !== "pending") return;
  ap.status = ok ? "approved" : "rejected";
  ap.decidedAt = now();
  if (ok && ap.kind === "bill_payment") {
    const bill = db.bills.find((b) => b.id === ap.refId);
    if (bill && bill.status !== "paid") executeBillPayment(bill);
  }
  if (ok && ap.kind === "transaction") {
    db.transactions.unshift({ ...ap.payload, id: uid(), source: "manual", createdAt: now(), history: [] });
  }
  audit("approval", `${ap.summary}: ${ap.status}`);
  toast(ok ? "Approved and executed" : "Rejected"); render();
}
/* Receive a PO: stock in, and the payable bill is created automatically. */
/* Fulfill a sales order from stock; invoice the customer automatically. */
function fulfillSO(soId, btn) {
  const so = db.salesOrders.find((s) => s.id === soId);
  if (!so || so.status !== "open") return;
  const prod = db.products.find((p) => p.sku === so.sku);
  if (prod && prod.stock < so.qty) { toast(`Insufficient stock: ${prod.stock.toLocaleString()} on hand, ${so.qty.toLocaleString()} needed`); return; }
  if (prod) prod.stock -= so.qty;
  so.status = "fulfilled";
  so.history.push({ at: now(), field: "status", from: "open", to: "fulfilled", by: "operator" });
  const due = new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10);
  const inv = { id: uid(), source: "automation", createdAt: now(), history: [],
    number: "INV-" + so.number, customer: so.customer, amount: so.totalUsd, issued: today(), due, status: "sent" };
  db.invoices.unshift(inv);
  so.status = "invoiced";
  audit("fulfillment", `${so.number} fulfilled (-${so.qty.toLocaleString()} ${so.sku}); ${inv.number} issued for ${fmt$(so.totalUsd)} (due ${due})`);
  notify(`${so.number} fulfilled — ${inv.number} sent to ${so.customer} for ${fmt$(so.totalUsd)}`, "sofl:" + so.id);
  if (btn) btn.closest(".win").remove();
  toast("Fulfilled — stock decremented, invoice issued"); runAutomations(); render();
}
function receivePO(poId, btn) {
  const po = db.purchaseOrders.find((p) => p.id === poId);
  if (!po || po.status !== "open") return;
  po.status = "received"; po.receivedAt = today();
  po.history.push({ at: now(), field: "status", from: "open", to: "received", by: "operator" });
  const prod = db.products.find((p) => p.sku === po.sku);
  if (prod) prod.stock += po.qty;
  const due = new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10);
  db.bills.unshift({ id: uid(), source: "automation", createdAt: now(), history: [],
    number: "BILL-" + po.number, vendor: po.vendor, amount: po.totalUsd, received: today(), due,
    status: "open", category: "Inventory", department: "Logistics" });
  audit("purchase", `${po.number} received: +${po.qty.toLocaleString()} ${po.sku}; bill created for ${fmt$(po.totalUsd)} (due ${due})`);
  notify(`${po.number} received — ${po.qty.toLocaleString()} × ${po.sku} in stock; payable ${fmt$(po.totalUsd)} due ${due}`, "porcv:" + po.id);
  if (btn) btn.closest(".win").remove();
  toast("Received — stock updated, bill created"); render();
}
/* Post a payroll run: one aggregated transaction per department. */
function runPayroll() {
  const m = thisMonth();
  const byDept = {};
  for (const e of db.employees) {
    const d = e.department || "General";
    byDept[d] = (byDept[d] || 0) + (Number(e.salary) || 0) / 24;
  }
  const total = Object.values(byDept).reduce((s, x) => s + x, 0);
  if (!total) { toast("No employee salaries to run"); return; }
  const key = "pay:" + m + ":" + today();
  if (db.notifKeys.includes(key)) { toast("Payroll already run today"); return; }
  db.notifKeys.push(key);
  for (const [d, amt] of Object.entries(byDept)) {
    db.transactions.unshift({ id: uid(), source: "automation", createdAt: now(), history: [],
      date: today(), amount: -Math.round(amt * 100) / 100, account: "Payroll", category: "Payroll",
      department: d, counterparty: "Payroll run " + today(), memo: `Semi-monthly payroll — ${d}` });
  }
  const payAcct = db.accounts.find((a) => a.name === "Payroll");
  if (payAcct) payAcct.balance = Math.round((payAcct.balance - total) * 100) / 100;
  audit("payroll", `Payroll run posted: ${fmt$(total)} across ${Object.keys(byDept).length} departments`);
  notify(`Payroll run posted — ${fmt$(total)}`, key + ":n");
  toast(`Payroll posted — ${fmt$(total)}`); runAutomations(); render();
}
function completeTask(id, btn) {
  const t = db.tasks.find((x) => x.id === id);
  if (!t) return;
  t.status = "done"; t.history.push({ at: now(), field: "status", from: "open", to: "done", by: "operator" });
  audit("task", `Completed: ${t.title}`);
  if (btn) btn.closest(".win").remove();
  render();
}

/* ================= CSV import ================= */
function importCsv() {
  const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".csv";
  inp.onchange = () => {
    const file = inp.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const lines = String(reader.result).split(/\r?\n/).filter((l) => l.trim());
      const head = lines[0].split(",").map((h) => h.trim().toLowerCase());
      const col = (names) => head.findIndex((h) => names.includes(h));
      const ci = { date: col(["date","transaction date"]), amount: col(["amount","value"]), memo: col(["memo","description","desc"]), cp: col(["counterparty","payee","name","merchant"]), cat: col(["category"]) };
      if (ci.date < 0 || ci.amount < 0) { toast("CSV needs 'date' and 'amount' columns"); return; }
      let added = 0;
      for (const line of lines.slice(1)) {
        const c = line.split(",");
        const amount = Number(String(c[ci.amount]).replace(/[$," ]/g, ""));
        if (isNaN(amount)) continue;
        db.transactions.unshift({ id: uid(), source: "csv:" + file.name, createdAt: now(), history: [],
          date: c[ci.date].trim(), amount,
          account: db.accounts[0] ? db.accounts[0].name : "Imported", department: "",
          category: ci.cat >= 0 ? (c[ci.cat] || "Imported").trim() : "Imported",
          counterparty: ci.cp >= 0 ? (c[ci.cp] || "").trim() : "", memo: ci.memo >= 0 ? (c[ci.memo] || "").trim() : "" });
        added++;
      }
      audit("import", `CSV ${file.name}: ${added} transactions`);
      toast(`Imported ${added} transactions`); runAutomations(); render();
    };
    reader.readAsText(file);
  };
  inp.click();
}

const sortState = {};
function sortBy(coll, field) {
  const s = sortState[coll];
  sortState[coll] = s && s.field === field ? { field, dir: -s.dir } : { field, dir: 1 };
  render();
}

/* Period presets applied to ledger and reports. */
let period = "all";
const PERIODS = { all: "All time", month: "This month", last: "Last month", qtd: "Quarter to date", ytd: "Year to date" };
function periodRange() {
  const t = today(), y = t.slice(0, 4), m = Number(t.slice(5, 7));
  if (period === "month") return [t.slice(0, 7) + "-01", t];
  if (period === "last") { const d = new Date(y, m - 2, 1); const e = new Date(y, m - 1, 0); return [d.toISOString().slice(0, 10), e.toISOString().slice(0, 10)]; }
  if (period === "qtd") { const qm = Math.floor((m - 1) / 3) * 3 + 1; return [`${y}-${String(qm).padStart(2, "0")}-01`, t]; }
  if (period === "ytd") return [y + "-01-01", t];
  return null;
}
function inPeriod(dateStr) {
  const r = periodRange();
  return !r || (dateStr >= r[0] && dateStr <= r[1]);
}
function setPeriod(p) { period = p; render(); }
let scenario = { rev: 0, cost: 0 };
function setScenario(k, v) { scenario[k] = Number(v); render(); }
function periodBar() {
  return `<div class="pill-toggle">` + Object.entries(PERIODS).map(([k, l]) =>
    `<span class="${period === k ? "on" : ""}" onclick="setPeriod('${k}')">${l}</span>`).join("") + `</div>`;
}
/* Bulk selection on the ledger. */
const bulkSel = new Set();
function bulkToggle(id, on) { if (on) bulkSel.add(id); else bulkSel.delete(id); render(); }
function bulkClear() { bulkSel.clear(); render(); }
function bulkApply(field, value) {
  if (!value) return;
  let n = 0;
  for (const id of bulkSel) {
    const t = db.transactions.find((x) => x.id === id);
    if (!t || t[field] === value) continue;
    t.history.push({ at: now(), field, from: t[field], to: value, by: "operator (bulk)" });
    t[field] = value; n++;
  }
  audit("bulk-edit", `Set ${field}="${value}" on ${n} transactions`);
  toast(`Updated ${n} transactions`); bulkSel.clear(); render();
}
function bulkDelete(btn) {
  if (!btn.dataset.armed) { btn.dataset.armed = "1"; btn.textContent = `Confirm delete ${bulkSel.size}`; return; }
  const n = bulkSel.size;
  db.transactions = db.transactions.filter((t) => !bulkSel.has(t.id));
  audit("bulk-delete", `Deleted ${n} transactions`);

function match(rec) { return !query || JSON.stringify(rec).toLowerCase().includes(query); }
function tbl(coll, cols, renderRow, rows) {
  rows = (rows || db[coll]).filter(match);
  const s = sortState[coll];
  if (s) rows = [...rows].sort((a, b) => {
    const x = a[s.field], y = b[s.field];
    return (typeof x === "number" && typeof y === "number" ? x - y : String(x ?? "").localeCompare(String(y ?? ""))) * s.dir;
  });
  if (!rows.length) return `<div class="tablewrap"><div class="empty">Nothing here${query ? " matching “" + query + "”" : ""}.</div></div>`;
  const head = cols.map((c) => {
    const [label, field] = Array.isArray(c) ? c : [c, null];
    const arr = field && sortState[coll] && sortState[coll].field === field ? `<span class="arr">${sortState[coll].dir > 0 ? "▲" : "▼"}</span>` : "";
    return field ? `<th onclick="sortBy('${coll}','${field}')">${label}${arr}</th>` : `<th style="cursor:default">${label}</th>`;
  }).join("");
  return `<div class="tablewrap"><table><thead><tr>${head}</tr></thead><tbody>` +
    rows.map((r) => `<tr class="row" onclick="if(!event.target.classList.contains('editable')&&!/^(A|BUTTON|INPUT|SELECT)$/.test(event.target.tagName))drill('${coll}','${r.id}')">${renderRow(r)}</tr>`).join("") +
    `</tbody></table></div>`;
}
const srcTag = (r) => { const s = (r.source || "manual").split(":")[0]; const cls = s === "automation" ? "acc" : s === "csv" ? "warn" : ""; return `<span class="tag ${cls}" title="${r.source}">${s}</span>`; };
const stTag = (s) => { const cls = /paid|active|connected|done|approved/.test(s) ? "ok" : /overdue|error|rejected/.test(s) ? "bad" : /sent|open|pending|paused/.test(s) ? "warn" : ""; return `<span class="tag ${cls}">${s}</span>`; };

function cashflowChart() {
  const byMonth = {};
  for (const t of db.transactions) {
    const m = (t.date || "").slice(0, 7);
    if (!m) continue;
    byMonth[m] = byMonth[m] || { in: 0, out: 0 };
    if (t.amount >= 0) byMonth[m].in += t.amount; else byMonth[m].out += -t.amount;
  }
  const months = Object.keys(byMonth).sort().slice(-8);
  if (!months.length) return "";
  const max = Math.max(...months.flatMap((m) => [byMonth[m].in, byMonth[m].out]), 1);
  const bw = 26, gap = 44, H = 120;
  const bars = months.map((m, i) => {
    const x = 20 + i * (bw * 2 + gap);
    const hi = Math.max(2, Math.round((byMonth[m].in / max) * H)), ho = Math.max(2, Math.round((byMonth[m].out / max) * H));
    return `<rect x="${x}" y="${140 - hi}" width="${bw}" height="${hi}" rx="2.5" fill="#3d6b47"><title>${m} in: ${fmt$(byMonth[m].in)}</title></rect>
      <rect x="${x + bw + 4}" y="${140 - ho}" width="${bw}" height="${ho}" rx="2.5" fill="#a8b0bd"><title>${m} out: ${fmt$(byMonth[m].out)}</title></rect>
      <text x="${x + bw}" y="155" fill="#98a2b3" font-size="10" text-anchor="middle">${m.slice(2)}</text>`;
  }).join("");
  const width = 40 + months.length * (bw * 2 + gap);
  return `<div class="card" style="margin-top:16px"><div class="k">Cash flow by month — <span style="color:#3d6b47">■ in</span>&nbsp; <span style="color:#a8b0bd">■ out</span> &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0">(hover for amounts)</span></div>
    <svg viewBox="0 0 ${width} 162" style="width:100%;max-width:${width * 1.35}px;margin-top:10px">${bars}</svg></div>`;
}
function kpis() {
  const months = {};
  for (const t of db.transactions) {
    const m = (t.date || "").slice(0, 7); if (!m) continue;
    months[m] = months[m] || { in: 0, out: 0 };
    if (t.amount >= 0) months[m].in += t.amount; else months[m].out += -t.amount;
  }
  const keys = Object.keys(months).sort().slice(-4, -1);
  const burn = keys.length ? keys.reduce((s, k) => s + months[k].out, 0) / keys.length : 0;
  const netAvg = keys.length ? keys.reduce((s, k) => s + months[k].in - months[k].out, 0) / keys.length : 0;
  const cash = db.accounts.reduce((s, a) => s + a.balance, 0);
  const runwayMonths = netAvg >= 0 ? Infinity : cash / -netAvg;
  const paid = db.invoices.filter((i) => i.status === "paid");
  return { burn, cash, runwayMonths, netAvg, paidCount: paid.length };
}
